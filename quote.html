  function renderGsi(){
    const sys = PCG.getSystemDef(gsiState.sysId); if(!sys) return;
    const pal = (PCG.DEPT_PALETTE||{})[sys.dept] || { color:'#0199fd', bg:'rgba(1,153,253,0.14)' };
    const a = gsiState.answers;
    const evalRes = PCG.evaluateSystem(sys, a);
    const adds = evalRes.adds;
    const warns = evalRes.warnings;

    const stepsHtml = sys.steps.map((step, i) => `
      <div class="gsi-step ${a[step.id] ? 'answered' : ''}">
        <div class="qn"><span class="num">${i + 1}</span><span class="q">${PCG.escapeHtml(step.q)}</span></div>
        <div class="gsi-opts">
          ${step.opts.map(o => `
            <div class="gsi-opt ${a[step.id] === o.v ? 'on' : ''}" data-sid="${step.id}" data-v="${o.v}">
              <span>${o.recommended ? '★ ' : ''}${PCG.escapeHtml(o.lbl)}</span>
              ${o.tag ? `<span class="tag ${o.tag === 'Standard' ? 'std' : o.tag === 'Complex' ? 'cx' : 'rec'}">${PCG.escapeHtml(o.tag)}</span>` : (o.recommended ? '<span class="tag rec">Recommended</span>' : '')}
            </div>`).join('')}
        </div>
      </div>`).join('');

    // Every `add` severity rule is REQUIRED · director enforces it
    // at quote-time. We visibly lock them so the AE knows these
    // cannot be omitted.
    const rulesHtml = (adds.length + warns.length)
      ? adds.concat(warns).map(r => {
          const isRequired = r.severity === 'add';
          const kind = r.type === 'labor' ? 'labor' : r.type === 'warn' ? 'warn' : 'gear';
          return `
          <div class="gsi-rule ${kind} ${isRequired ? 'required' : ''}">
            <span class="rico">${r.type === 'labor' ? '👥' : r.type === 'warn' ? '⚠' : '⚙'}</span>
            <div>
              <strong>${PCG.escapeHtml(r.item)}</strong>
              ${isRequired
                ? '<span class="lock-chip">Required by system standard</span>'
                : '<span class="auto-chip">Warning</span>'}
              <span class="why">↳ ${PCG.escapeHtml(r.why)}</span>
            </div>
          </div>`;
        }).join('')
      : '<div style="font-size: 12px; color: var(--text-tertiary);">No conditional rules have fired yet — base package only.</div>';

    // "Removing this will break:" warning · surfaces when >=2 critical
    // rules are active (arena delay, broadcast RF, processor redundancy,
    // 3+ camera shader). Demo-safe heuristic per system.
    const breaksList = computeBreaks(sys, a);
    const breakWarnHtml = breaksList.length >= 1 ? `
      <div class="gsi-break-warn">
        <h4>🛑 Removing this will break:</h4>
        <ul>${breaksList.map(b => `<li>${PCG.escapeHtml(b)}</li>`).join('')}</ul>
      </div>` : '';

    // Reconfigure delta panel · compute before/after item diff
    let deltaHtml = '';
    if(gsiState.mode === 'reconfigure' && gsiState.priorAnswers){
      const priorAdds = PCG.evaluateSystem(sys, gsiState.priorAnswers).adds;
      const keyOf = (x) => `${x.type}::${x.item}`;
      const priorMap = new Set(priorAdds.map(keyOf));
      const nextMap  = new Set(adds.map(keyOf));
      const added   = adds.filter(x => !priorMap.has(keyOf(x)));
      const removed = priorAdds.filter(x => !nextMap.has(keyOf(x)));
      const kept    = adds.filter(x => priorMap.has(keyOf(x)));
      const rows = []
        .concat(added.map(x => ({ tg:'add', t:'+', cls:'add', item:x })))
        .concat(removed.map(x => ({ tg:'rem', t:'−', cls:'rem', item:x })));
      if(rows.length){
        deltaHtml = `
          <div class="gsi-delta">
            <h4>⚡ What will change · reconfigure delta</h4>
            ${rows.map(r => `
              <div class="row">
                <span class="tg ${r.cls}">${r.tg === 'add' ? 'Added' : 'Removed'}</span>
                <span>${r.item.type === 'labor' ? '👥' : r.item.type === 'warn' ? '⚠' : '⚙'} <strong>${PCG.escapeHtml(r.item.item)}</strong><br><span style="font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono);">${PCG.escapeHtml(r.item.why)}</span></span>
              </div>`).join('')}
            <div class="row" style="border-bottom: 0; padding-top: 8px;">
              <span class="tg same">Unchanged</span>
              <span style="color: var(--text-tertiary);">${kept.length} item${kept.length===1?'':'s'} preserved from prior configuration · quote lines held as-is</span>
            </div>
          </div>`;
      } else {
        deltaHtml = `
          <div class="gsi-delta">
            <h4>⚡ What will change · reconfigure delta</h4>
            <div style="font-size: 12.5px; color: var(--text-tertiary);">Answers match the prior configuration · nothing to change.</div>
          </div>`;
      }
    }

    const baseLaborN = sys.base.labor.length;
    const baseGearN  = sys.base.gear.length;
    const addLaborN  = adds.filter(a => a.type === 'labor').length;
    const addGearN   = adds.filter(a => a.type === 'gear').length;
    const o = sys.outputs(a, adds);

    document.getElementById('gsi-body').innerHTML = `
      <div class="gsi-head" style="--dept-color: ${pal.color}; --dept-bg: ${pal.bg};">
        <div class="ico" style="background: ${pal.bg}; color: ${pal.color};">${sys.ico}</div>
        <div>
          <h3>${PCG.escapeHtml(sys.name)} · guided insert</h3>
          <div class="meta">Director: <b>${PCG.escapeHtml(sys.director)}</b> · ${PCG.escapeHtml(sys.directorTitle)} · pinned to <b>v${sys.version}</b></div>
        </div>
        <span class="pin">✓ Pinned to v${sys.version}</span>
      </div>

      <div class="gsi-dir-note">
        <div><strong>${PCG.escapeHtml(sys.directorTitle)} says:</strong> ${sys.directorNote}</div>
      </div>

      <div class="gsi-steps">${stepsHtml}</div>

      ${deltaHtml}

      <div class="gsi-rules">
        <h4>⚙ Rules fired · automatic inclusions · <span style="font-family: var(--font-mono); letter-spacing: 0; text-transform: none; font-size: 11px; color: var(--text-tertiary);">director-enforced</span></h4>
        ${rulesHtml}
        ${breakWarnHtml}
      </div>

      <div class="gsi-output">
        <h4>⚡ This insertion will add to the quote</h4>
        <div class="gsi-stats">
          <div class="st"><div class="lbl">Quote impact</div><div class="v">$${o.quote.toLocaleString()}</div><div class="nt">Line items added</div></div>
          <div class="st"><div class="lbl">Labor positions</div><div class="v">${baseLaborN + addLaborN}</div><div class="nt">${baseLaborN} base + ${addLaborN} from rules</div></div>
          <div class="st"><div class="lbl">Gear items</div><div class="v">${baseGearN + addGearN}</div><div class="nt">${baseGearN} base + ${addGearN} rule-added</div></div>
          <div class="st"><div class="lbl">Schedule rows</div><div class="v">+${o.schedule}</div><div class="nt">Propagate to Production Schedule</div></div>
          <div class="st"><div class="lbl">Show Flow cues</div><div class="v">${o.flow ? '+' + o.flow : '—'}</div><div class="nt">${o.flow ? 'Seed cues' : 'Composite · see sub-systems'}</div></div>
          <div class="st"><div class="lbl">Warehouse items</div><div class="v">${o.warehouse}</div><div class="nt">Pulled at load-in</div></div>
        </div>
      </div>

      <div class="gsi-actions">
        <button class="btn ghost" onclick="closeGsi()">Cancel</button>
        <button class="btn primary" id="gsi-commit">${gsiState.mode === 'reconfigure' ? '✓ Apply changes · update instance' : '✓ Insert system into quote'}</button>
        <span class="note">${gsiState.mode === 'reconfigure' ? 'Reconfigure safely · existing quote lines update in place.' : 'Director rules enforce required gear + labor · nothing critical gets forgotten.'}</span>
      </div>
    `;

    // Wire answer clicks · re-render to re-evaluate rules live
    document.querySelectorAll('#gsi-body .gsi-opt').forEach(el => el.addEventListener('click', () => {
      gsiState.answers[el.dataset.sid] = el.dataset.v;
      renderGsi();
    }));

    document.getElementById('gsi-commit').addEventListener('click', () => {
      // Persist reuse-count bump per system (demo-safe)
      try {
        const key = `pcg_sb_${sys.id}`;
        const prev = JSON.parse(sessionStorage.getItem(key) || 'null') || { applied: 0 };
        prev.applied = (prev.applied || 0) + 1;
        prev.last = { at: new Date().toISOString(), answers: { ...a }, revision: sys.version };
        sessionStorage.setItem(key, JSON.stringify(prev));
      } catch(e){ /* no-op */ }

      // Persist the instance · INSERT creates a new one · RECONFIGURE
      // updates in place. The card list reads from this store on render.
      const insts = loadInstances();
      const finalAdds = adds.slice();
      const outputs = o;
      if(gsiState.mode === 'reconfigure' && gsiState.instanceId){
        const idx = insts.findIndex(i => i.id === gsiState.instanceId);
        if(idx >= 0){
          insts[idx] = Object.assign({}, insts[idx], {
            answers: Object.assign({}, a),
            adds: finalAdds,
            outputs,
            updatedAt: new Date().toISOString(),
            reconfigured: (insts[idx].reconfigured || 0) + 1
          });
        }
      } else {
        // New instance · label numbered within this sysDef scope
        const seq = insts.filter(i => i.sysId === sys.id).length + 1;
        insts.push({
          id: 'si_' + Math.random().toString(36).slice(2, 9),
          sysId: sys.id,
          version: sys.version,
          label: `Instance #${seq}`,
          answers: Object.assign({}, a),
          adds: finalAdds,
          outputs,
          dept: sys.dept,
          createdAt: new Date().toISOString(),
          reconfigured: 0
        });
      }
      saveInstances(insts);
      renderSystemInstances();

      // Surface a confirmation
      const verb = gsiState.mode === 'reconfigure' ? 'reconfigured in this quote' : 'inserted into quote';
      const summary = `✓ ${sys.name} ${verb}\n\n`
        + `$${outputs.quote.toLocaleString()} ${gsiState.mode === 'reconfigure' ? 'adjusted' : 'added'} (pinned to v${sys.version})\n`
        + `${baseLaborN + addLaborN} labor positions · ${baseGearN + addGearN} gear items\n`
        + `${finalAdds.length} rule-driven lines${gsiState.mode === 'reconfigure' ? ' recomputed' : ' added automatically'}\n\n`
        + `Propagated:\n`
        + `· ${gsiState.mode === 'reconfigure' ? 'Updated' : '+' + outputs.schedule} Production Schedule rows\n`
        + `· ${outputs.flow ? (gsiState.mode === 'reconfigure' ? 'Updated ' : '+') + outputs.flow + ' Show Flow cues' : 'Composite — sub-systems drive cues'}\n`
        + `· ${outputs.warehouse} warehouse items\n`
        + `· TD Package + Advance regenerated\n`
        + `· Client Portal "What changed" updated`;
      alert(summary);
      closeGsi();
    });
  }

  // =================================================================
  // "REMOVING THIS WILL BREAK:" · per-system critical dependency map.
  // Demo-safe · derived from the current answers so the warnings read
  // true as the AE toggles options.
  // =================================================================
  function computeBreaks(sys, a){
    const list = [];
    if(sys.id === 'imag'){
      if((parseInt(a.cams)||0) >= 3) list.push('IMAG signal integrity · shader keeps iris + matrix consistent');
      if(a.rec === 'rec' || a.rec === 'both') list.push('Recording chain · no Ki Pro means no ISO capture');
      if(a.rec === 'live' || a.rec === 'both') list.push('Stream redundancy · no backup internet path = outage risk');
      if(a.room === 'arena') list.push('Delay coverage · back-of-house audience loses IMAG');
      if(a.room === 'arena') list.push('Processor redundancy · single-point failure on the main E2');
    }
    if(sys.id === 'led-wall'){
      if(a.size === 'large') list.push('Processor redundancy · 30\'+ walls cannot run on one processor');
      if(a.support === 'flown') list.push('Rigging load · fly frame needs a rig call or wall cannot go up');
      if(a.app === 'scenic') list.push('Floor protection · scenic LED walks damage floor panels');
      if(a.pitch === '5.9' || (a.app === 'scenic' && a.size === 'large')) list.push('Weatherproofing · outdoor tiles fail without covers');
    }
    if(sys.id === 'line-array'){
      if(a.room === 'arena' || a.delay === 'yes') list.push('Delay coverage · back-of-room audience loses intelligibility');
      if(a.wireless === 'broadcast') list.push('RF coordination · 16+ channels without spectrum scan = dropouts');
      if(a.mon === 'wedge' || a.mon === 'both') list.push('Monitor mixing · a monitor engineer is non-negotiable with wedges');
    }
    if(sys.id === 'breakout' && (parseInt(a.count)||1) >= 5){
      list.push('Crew safety · no floating lead means a solo tech during a break');
    }
    if(sys.id === 'gs-package' && a.awards === 'yes'){
      list.push('Awards lighting · follow-spots are required for winner isolation');
    }
    return list;
  }

  // =================================================================
  // SYSTEMS IN THIS QUOTE · first-class instance cards.
  // Re-renders on every insert / reconfigure.
  // =================================================================
  function renderSystemInstances(){
    const card = document.getElementById('sys-instances-card');
    const body = document.getElementById('sys-instances-body');
    const count = document.getElementById('sys-instances-count');
    if(!card || !body) return;
    const insts = loadInstances();
    if(!insts.length){ card.style.display = 'none'; return; }
    card.style.display = 'block';
    count.textContent = `${insts.length} system${insts.length === 1 ? '' : 's'} · director-enforced`;
    body.innerHTML = insts.map(inst => {
      const sys = PCG.getSystemDef(inst.sysId);
      if(!sys) return '';
      const baseLabor = sys.base.labor.length;
      const baseGear = sys.base.gear.length;
      const ruleLabor = (inst.adds || []).filter(x => x.type === 'labor').length;
      const ruleGear  = (inst.adds || []).filter(x => x.type === 'gear').length;
      const answerChips = Object.entries(inst.answers || {}).map(([k, v]) => {
        const step = sys.steps.find(s => s.id === k);
        const opt  = step && step.opts.find(o => o.v === v);
        const lbl  = opt ? opt.lbl : v;
        return `<span class="ans">${PCG.escapeHtml(step ? step.q.replace(/\?$/, '') : k)}: <b>${PCG.escapeHtml(lbl)}</b></span>`;
      }).join('');
      const recon = inst.reconfigured ? `<span class="muted" style="font-size: 10.5px; margin-left: 6px;">· reconfigured ${inst.reconfigured}×</span>` : '';
      return `
        <div class="sys-inst" data-dept="${sys.dept}">
          <div class="head">
            <div class="ico">${sys.ico}</div>
            <div>
              <div class="name">${PCG.escapeHtml(sys.name)} <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); font-weight: 400; margin-left: 4px;">${PCG.escapeHtml(inst.label)}</span><span class="pin">v${sys.version} pinned</span></div>
              <div class="meta">Authored by <span class="d">${PCG.escapeHtml(sys.director)}</span> · ${PCG.escapeHtml(sys.directorTitle)} · ${PCG.escapeHtml(sys.deptLabel)}${recon}</div>
            </div>
            <div class="actions">
              <button onclick="openGsi('${inst.sysId}','${inst.id}')" class="primary">🔄 Reconfigure</button>
              <button onclick="openBreakdown('${inst.id}')">🔍 View breakdown</button>
            </div>
          </div>
          <div class="answers">${answerChips}</div>
          <div class="summary">
            <div class="sm"><div class="lbl">Quote impact</div><div class="v">$${(inst.outputs && inst.outputs.quote || 0).toLocaleString()}</div></div>
            <div class="sm"><div class="lbl">Labor positions</div><div class="v">${baseLabor + ruleLabor}</div></div>
            <div class="sm"><div class="lbl">Gear items</div><div class="v">${baseGear + ruleGear}</div></div>
            <div class="sm"><div class="lbl">Rules fired</div><div class="v">${(inst.adds || []).length}</div></div>
          </div>
          <div class="rule-note">⚡ Generated by director rules · ${ruleLabor} labor + ${ruleGear} gear added automatically · cannot be removed while this configuration stands</div>
        </div>`;
    }).join('');
  }

  // =================================================================
  // BREAKDOWN MODAL · rule-attributed gear + labor for one instance.
  // Shows base items and rule-added items separately · marks required.
  // =================================================================
  window.openBreakdown = (instanceId) => {
    const insts = loadInstances();
    const inst = insts.find(i => i.id === instanceId);
    if(!inst) return;
    const sys = PCG.getSystemDef(inst.sysId); if(!sys) return;
    const pal = (PCG.DEPT_PALETTE||{})[sys.dept] || { color:'#0199fd', bg:'rgba(1,153,253,0.14)' };
    const adds = inst.adds || [];
    const gearAdds  = adds.filter(a => a.type === 'gear');
    const laborAdds = adds.filter(a => a.type === 'labor');
    const breaks = computeBreaks(sys, inst.answers || {});

    const ruleLabel = (x) => x.ruleLabel || x.ruleId || 'Rule';
    const gearRows = []
      .concat(sys.base.gear.map(g => ({ item:g.item, origin:'base', attr:'Base · always included' })))
      .concat(gearAdds.map(g => ({ item:g.item, origin:g.severity === 'warn' ? 'warn' : 'rule', attr:`Rule · ${ruleLabel(g)}`, why: g.why })));
    const laborRows = []
      .concat(sys.base.labor.map(l => ({ item:l.item, origin:'base', attr:'Base · always included' })))
      .concat(laborAdds.map(l => ({ item:l.item, origin:'req', attr:`Rule · ${ruleLabel(l)}`, why: l.why })));

    const rowHtml = (r) => `
      <div class="sbk-row">
        <div>
          <div class="item">${PCG.escapeHtml(r.item)}</div>
          <div class="attr">${PCG.escapeHtml(r.attr)}${r.why ? ' · ' + PCG.escapeHtml(r.why) : ''}</div>
        </div>
        <span class="origin ${r.origin === 'base' ? 'base' : r.origin === 'req' ? 'req' : 'rule'}">${r.origin === 'base' ? 'Base' : r.origin === 'req' ? '🔒 Required' : 'Rule · ' + (r.origin === 'warn' ? 'Warn' : 'Add')}</span>
      </div>`;

    const body = `
      <div class="sbk-head" style="--inst-color: ${pal.color}; --inst-bg: ${pal.bg};">
        <div class="ico" style="background: ${pal.bg}; color: ${pal.color};">${sys.ico}</div>
        <div>
          <h3>${PCG.escapeHtml(sys.name)} · ${PCG.escapeHtml(inst.label)}</h3>
          <div class="meta">Authored by <b>${PCG.escapeHtml(sys.director)}</b> · ${PCG.escapeHtml(sys.directorTitle)} · pinned to <b style="color: ${pal.color};">v${sys.version}</b></div>
        </div>
        <div style="font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary);">${adds.length} rule-added · ${gearRows.length + laborRows.length} total items</div>
      </div>

      <div class="sbk-two">
        <div class="sbk-list-card">
          <h4>⚙ Gear <span class="cnt">${gearRows.length}</span></h4>
          ${gearRows.map(rowHtml).join('')}
        </div>
        <div class="sbk-list-card">
          <h4>👥 Labor <span class="cnt">${laborRows.length}</span></h4>
          ${laborRows.map(rowHtml).join('')}
        </div>
      </div>

      ${breaks.length ? `
        <div class="gsi-break-warn" style="margin-top: 14px;">
          <h4>🛑 Director rules · these must stay in scope</h4>
          <ul>${breaks.map(b => `<li>${PCG.escapeHtml(b)}</li>`).join('')}</ul>
        </div>` : ''}

      <div class="sbk-foot">
        <strong>How to read this:</strong> Items marked <em>Base</em> are always included in the system by the director. Items marked <em>🔒 Required</em> were added automatically because your answers triggered a director-defined rule — they cannot be removed without changing the configuration. To remove a required item, open <strong>Reconfigure</strong> and change the answer that triggered it.
      </div>
    `;
    document.getElementById('sbk-body').innerHTML = body;
    document.getElementById('sbk-bd').classList.add('show');
    document.getElementById('sbk-box').classList.add('show');
  };
  window.closeBreakdown = () => {
    document.getElementById('sbk-bd').classList.remove('show');
    document.getElementById('sbk-box').classList.remove('show');
  };

  // Render on page load so any prior-session instances are visible.
  renderSystemInstances();

  window.addLaborPos = (positionId) => {
    const pos = (PCG.crewPositions||[]).find(p=>p.id===positionId);
    const rate = pos && pos.ratesByVersion && pos.ratesByVersion[0];
    const res = PCG.api.addQuoteLine(rev.id, {
      packageName: 'Labor',
      type: 'Labor',
      crewPositionId: positionId,
      description: pos ? (pos.displayName || pos.name) : positionId,
      qty: 1, rateTier: 'day',
      unitPrice: (rate && rate.billRate) || 0,
      days: 1,
      cost: (rate && rate.payRate) || 0
    });
    if(!res.ok){ alert('Blocked: '+res.reason); return; }
    modal.close();
    render('labor');
    document.querySelectorAll('.qb-views button').forEach(b=>b.classList.toggle('on', b.dataset.v==='labor'));
  };

  // --------------------------------------------------------------------
  // Real Copy-From-Prior-Quote
  // --------------------------------------------------------------------
  const copy = {
    open: () => { document.getElementById('cp-bd').classList.add('show'); document.getElementById('cp-box').classList.add('show'); renderCopy(); },
    close: () => { document.getElementById('cp-bd').classList.remove('show'); document.getElementById('cp-box').classList.remove('show'); }
  };
  window.closeCopy = copy.close;

  document.getElementById('btn-copy-from').addEventListener('click', () => {
    if(!editableByMe){ alert('This revision is read-only.'); return; }
    copy.open();
  });

  function renderCopy(){
    const allQuotes = (PCG.api.getQuotes()||[]).filter(q => q.id !== quote.id);
    const byClient = {};
    allQuotes.forEach(q => {
      const p = (PCG.projects||[]).find(x=>x.code===q.projectCode);
      const clientName = (p && p.client) || 'Unknown';
      (byClient[clientName] = byClient[clientName] || []).push(q);
    });
    const body = document.getElementById('cp-body');
    body.innerHTML = `
      <div class="muted" style="font-size:var(--fs-xs); margin-bottom:var(--sp-3);">
        Pick a prior quote to copy its line items into this revision. Recommended for recurring clients (spec §5.3).
      </div>
      ${Object.entries(byClient).map(([cn, qs]) => `
        <div style="margin-bottom:var(--sp-4);">
          <div class="eyebrow" style="margin-bottom:6px;">${PCG.escapeHtml(cn)}</div>
          ${qs.map(q => {
            const rcount = (PCG.quoteRevisions||[]).filter(r=>r.quoteId===q.id).length;
            const activeRev = (PCG.quoteRevisions||[]).find(r=>r.id===q.activeRevisionId);
            const ln = activeRev ? (activeRev.lines||[]).length : 0;
            return `
              <div class="pinned" style="margin-bottom:6px; cursor:pointer;" onclick="pickCopyQuote('${q.id}')">
                <span class="icon mono" style="font-size:10px;">${q.quoteNo}</span>
                <div style="flex:1;">
                  <strong>${PCG.escapeHtml(q.projectCode)}</strong>
                  <div class="muted" style="font-size:var(--fs-xs);">${rcount} rev · ${ln} lines · ${q.status}</div>
                </div>
                <span class="mono" style="color:var(--text-secondary); font-size:11px;">${PCG.money(q.totalRevenue)}</span>
              </div>`;
          }).join('')}
        </div>`).join('') || PCG.states.empty('No prior quotes to copy from.')}`;
  }

  window.pickCopyQuote = (srcQuoteId) => {
    const srcQ = (PCG.quotes||[]).find(q=>q.id===srcQuoteId);
    const srcRev = (PCG.quoteRevisions||[]).find(r=>r.id===srcQ.activeRevisionId);
    const mode = (rev.lines||[]).length === 0
      ? 'replace'
      : (confirm(`This revision already has ${rev.lines.length} lines. OK to replace them all with ${(srcRev.lines||[]).length} lines from ${srcQ.quoteNo}?\n\n(Cancel will append instead.)`) ? 'replace' : 'append');
    const res = PCG.api.cloneRevisionLinesFrom(srcRev.id, rev.id, mode);
    if(!res.ok){ alert('Blocked: '+res.reason); return; }
    copy.close();
    render('working');
    document.querySelectorAll('.qb-views button').forEach(b=>b.classList.toggle('on', b.dataset.v==='working'));
    alert(`✓ ${mode==='replace'?'Replaced':'Appended'} ${res.cloned} line(s) from ${srcQ.quoteNo}.`);
  };

  // --------------------------------------------------------------------
  // Client Portal Preview (opens magic-link — auto-generates preview invite if none exists)
  // --------------------------------------------------------------------
  document.getElementById('btn-client-preview').addEventListener('click', () => {
    let invites = PCG.api.getClientInvites({ quoteId: quote.id });
    if(invites.length === 0){
      if(!confirm('No client magic-link yet. Generate a preview link now?\n\n(This creates a preview invite that you can open. Use "Issue Proposal" for the real client-facing workflow.)')) return;
      try {
        const res = PCG.api.issueQuoteToClient(quote.id);
        if(!res.ok){ alert('Could not create preview link: '+res.reason); return; }
        invites = [res.invite];
      } catch(e){ alert('Could not create preview link: '+e.message); return; }
    }
    window.open('client/index.html?token=' + invites[0].token, '_blank', 'noopener');
  });

  // --------------------------------------------------------------------
  // Quote Status dropdown
  // --------------------------------------------------------------------
  (function wireStatus(){
    const sel = document.getElementById('quote-status');
    if(!sel) return;
    sel.value = quote.status || 'Draft';
    sel.addEventListener('change', () => {
      const newStatus = sel.value;
      if(newStatus === quote.status) return;
      let reason = '';
      if(newStatus === 'Cancelled' || newStatus === 'Lost' || newStatus === 'OnHold'){
        reason = prompt(`Reason for moving to "${newStatus}" (required for audit):`);
        if(!reason){ sel.value = quote.status; return; }
      } else {
        if(!confirm(`Change quote status: ${quote.status} → ${newStatus}?`)){ sel.value = quote.status; return; }
      }
      try {
        PCG.api.updateQuoteStatus(quote.id, newStatus, reason);
        alert(`✓ Status updated to ${newStatus}.`);
        if(newStatus === 'Awarded'){
          if(confirm('Awarded quotes can now be converted to pull sheets. Convert now?')){
            doConvertToPullSheets();
          }
        }
      } catch(e){
        alert('Status change failed: '+e.message);
        sel.value = quote.status;
      }
    });
  })();

  // --------------------------------------------------------------------
  // Convert quote → per-department pull sheets (replaces GO-Order)
  // --------------------------------------------------------------------
  function doConvertToPullSheets(){
    if(!confirm(`Generate pull sheets from this quote?\n\nOne PullSheet will be created per department (Audio, Video, Lighting, etc.). TSMs lock each dept's gear on pull-sheet.html.\n\nThis replaces the legacy GO-Order process.`)) return;
    try {
      const res = PCG.api.convertQuoteToPullSheets(quote.id);
      if(!res.ok){ alert('Conversion blocked: '+res.reason); return; }
      const lines = res.created.map(c => {
        if(c.skipped) return `  • ${c.dept}: skipped (${c.reason})`;
        if(c.merged)  return `  • ${c.dept}: merged ${c.added} line(s) into existing ${c.id}`;
        return `  • ${c.dept}: created ${c.id} (${c.lines} lines)`;
      });
      const openFirst = res.created.find(c => c.created || c.merged);
      if(confirm(`✓ Pull sheets generated:\n\n${lines.join('\n')}\n\nOpen the first pull sheet now for TSM dept-lock?`) && openFirst){
        location.href = 'pull-sheet.html?id=' + openFirst.id;
      }
    } catch(e){ alert('Convert failed: '+e.message); }
  }
  document.getElementById('btn-convert-ps').addEventListener('click', doConvertToPullSheets);

  function showIssueBanner(invite) {
    const url = 'client/index.html?token=' + invite.token;
    document.getElementById('issue-banner').innerHTML = `
      <div class="attn-item blue" style="margin-bottom:var(--sp-4);">
        <div style="font-size:18px;">✉</div>
        <div style="flex:1;">
          <div class="ttl">Issued to client portal</div>
          <div class="meta">Magic link: <code style="background:var(--surface-2); padding:2px 6px; border-radius:3px; font-size:11px; user-select:all;">${PCG.escapeHtml(url)}</code></div>
        </div>
        <div style="display:flex; gap:6px;">
          <button class="btn sm" onclick="navigator.clipboard.writeText(location.origin + location.pathname.replace(/[^/]+$/,'') + '${PCG.escapeHtml(url)}').then(()=>this.textContent='✓ Copied').catch(()=>alert('Copy failed'))">Copy URL</button>
          <a class="btn sm primary" href="${url}" target="_blank" rel="noopener">Open Portal ↗</a>
        </div>
      </div>`;
  }

  // --------------------------------------------------------------------
  // Issue Proposal → real client portal flow (replaces Phase-2 shortcut)
  // Draft → Issued → (client approves in portal) → Awarded
  // --------------------------------------------------------------------
  document.getElementById('btn-issue').addEventListener('click', ()=>{
    if(rev.status==='Awarded'){
      if(confirm('Revision already Awarded. Open Assign Crew?')){
        location.href = 'crew-assign.html?project=' + project.code;
      }
      return;
    }
    try {
      PCG.engines.pricing.enforceDiscountGuard(0.05);
      const approvals = PCG.api.getClientApprovals({ quoteId: quote.id });
      const alreadyApproved = approvals.find(a => a.action==='Approved');

      if(alreadyApproved){
        const laborCount = (rev.lines||[]).filter(l=>l.type==='Labor').reduce((s,l)=>s+(l.qty||1),0);
        if(!confirm(`Client approved on ${PCG.fmtDate(alreadyApproved.at,{time:true})}. Award quote?\n\nThis creates the ScopeRecord and seeds ${laborCount} Placeholder ShiftAssignments for Labor Coord.`)) return;
        const result = PCG.api.awardQuote(quote.id);
        if(result.ok){
          alert(`Quote awarded.\n✓ ScopeRecord frozen\n✓ ${result.seeded} ShiftAssignments seeded as Placeholder\nOpening Assign Crew →`);
          location.href = 'crew-assign.html?project=' + project.code;
        } else {
          alert('Award failed: ' + result.reason);
        }
        return;
      }

      if(rev.status==='Issued'){
        if(!confirm('Proposal already issued. Re-issue (generates a new magic link)?')) return;
      } else {
        if(!confirm('Issue this proposal to the client?\n\nWill generate a magic-link to the Client Portal — client reviews, approves or requests changes in the portal. On approval, you\'ll be able to Award.')) return;
      }
      const res = PCG.api.issueQuoteToClient(quote.id);
      if(!res.ok){ alert('Issue failed: '+res.reason); return; }
      showIssueBanner(res.invite);
      rev.status = 'Issued'; rev.issuedAt = res.invite.issuedAt;
    } catch(e){ alert('Blocked: '+e.message); }
  });

  // If this quote has already been issued, show the banner on load for quick access.
  (function(){
    const invites = PCG.api.getClientInvites({ quoteId: quote.id });
    if(invites.length) showIssueBanner(invites[0]);
  })();
</script>
</body>
</html>
