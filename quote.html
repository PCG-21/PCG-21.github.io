<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PCG Stage · Quote Builder</title>
<link rel="stylesheet" href="assets/tokens.css" />
<link rel="stylesheet" href="assets/app.css" />
</head>
<body>
<div class="app">
  <div id="app-shell"></div>
  <main class="main">
    <div class="container">

      <!-- Header -->
      <div id="q-header"></div>

      <!-- 5 view tabs (spec §6.1 — all 5 must be implemented) -->
      <div style="display:flex; align-items:center; gap:var(--sp-3); margin-bottom: var(--sp-4); flex-wrap: wrap;">
        <div class="qb-views" id="qb-views">
          <button class="on" data-v="working">Working</button>
          <button data-v="profit">Profit-Margin</button>
          <button data-v="change">Change</button>
          <button data-v="warehouse">Warehouse</button>
          <button data-v="labor">Labor</button>
        </div>
        <div style="margin-left:auto; display:flex; gap:var(--sp-2); flex-wrap:wrap; align-items:center;">
          <span class="muted" style="font-size:10px; text-transform:uppercase; letter-spacing:0.08em;">Status</span>
          <select id="quote-status" style="background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:5px 10px; border-radius:var(--r-sm); font-size:var(--fs-sm);">
            <option value="Draft">Draft</option>
            <option value="InReview">In Review</option>
            <option value="Issued">Issued to Client</option>
            <option value="Awarded">Awarded</option>
            <option value="OnHold">On Hold</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Lost">Lost</option>
          </select>
          <button class="btn sm ghost" id="btn-new-line">＋ Add Line</button>
          <button class="btn sm ghost" id="btn-copy-from">Copy From Prior Quote</button>
          <button class="btn sm" id="btn-recheck">Re-check Avail</button>
          <button class="btn sm" id="btn-client-preview">Client Portal Preview ↗</button>
          <button class="btn sm spectrum" id="btn-convert-ps">Convert to Pull Sheets →</button>
          <button class="btn sm primary" id="btn-issue">Issue Proposal</button>
        </div>
      </div>

      <!-- Issue result banner (appears after Issue-to-Client) -->
      <div id="issue-banner"></div>

      <!-- Real Add Line / System Builder / Labor picker modal -->
      <div class="modal-backdrop" id="pk-bd" onclick="closePicker()"></div>
      <div class="modal-box" id="pk-box" style="max-width:780px; width:calc(100vw - 48px);">
        <button class="close" onclick="closePicker()" style="position:absolute; top:10px; right:10px; background:transparent; border:0; color:var(--text-secondary); font-size:20px; cursor:pointer;">×</button>
        <h3 id="pk-title">Add line to quote</h3>
        <div class="qb-views" id="pk-tabs" style="margin-top:var(--sp-3); flex-wrap: wrap;">
          <button class="on" data-pt="items">Items · Rental</button>
          <button data-pt="systems">System Builder</button>
          <button data-pt="labor">Labor</button>
          <button data-pt="travel">Travel</button>
          <button data-pt="transport">Transport</button>
          <button data-pt="subrental">Sub-Rental</button>
          <button data-pt="purchase">Purchase / Buyout</button>
          <button data-pt="service">Service</button>
          <button data-pt="heavy">Heavy Equip</button>
          <button data-pt="fee">Fee</button>
          <button data-pt="discount">Discount</button>
          <button data-pt="bundle">Bundle</button>
          <button data-pt="consumable">Consumable</button>
          <button data-pt="misc">Misc / Header / Note / Assumption</button>
        </div>
        <div id="pk-body" style="margin-top:var(--sp-3); max-height: 60vh; overflow:auto;"></div>
      </div>

      <!-- ==============================================================
           GUIDED SYSTEM INSERT (AE quote-time flow).
           Opens when the AE clicks "Insert system · guided →" from the
           Systems tab. Runs the director's authored stepper against
           the AE's answers, fires rules, and commits the expanded
           result to the quote as grouped lines.
           ============================================================== -->
      <div class="modal-backdrop" id="gsi-bd" onclick="closeGsi()"></div>
      <div class="modal-box" id="gsi-box" style="max-width:920px; width:calc(100vw - 48px); max-height: 92vh; overflow:auto;">
        <button class="close" onclick="closeGsi()" style="position:absolute; top:10px; right:10px; background:transparent; border:0; color:var(--text-secondary); font-size:20px; cursor:pointer;">×</button>
        <div id="gsi-body"></div>
      </div>
      <style>
        /* Guided system insert · AE quote-time flow */
        .gsi-head {
          display: grid; grid-template-columns: 44px 1fr auto; gap: 14px; align-items: center;
          padding-bottom: 14px; margin-bottom: 16px;
          border-bottom: 1px solid var(--border);
        }
        .gsi-head .ico {
          width: 44px; height: 44px; border-radius: 12px;
          display: grid; place-items: center; font-size: 22px;
        }
        .gsi-head h3 { margin: 0; font-family: var(--font-display); font-size: 18px; }
        .gsi-head .meta {
          font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 2px;
        }
        .gsi-head .meta b { color: var(--pcg-bright-blue); }
        .gsi-head .pin {
          margin-left: auto;
          font-family: var(--font-display); font-size: 10px; letter-spacing: 0.08em;
          text-transform: uppercase; font-weight: 700;
          padding: 3px 10px; border-radius: var(--r-pill);
          background: rgba(61,220,132,0.16); color: var(--status-green);
          border: 1px solid rgba(61,220,132,0.35);
        }
        .gsi-dir-note {
          padding: 12px 14px; margin-bottom: 14px;
          border-radius: var(--r-sm);
          background: linear-gradient(90deg, rgba(149,100,216,0.10), transparent 80%);
          border: 1px dashed rgba(149,100,216,0.4); border-left: 3px solid var(--pcg-spotlight-purple);
          font-size: 12.5px; color: var(--text-primary); line-height: 1.55;
          display: flex; gap: 10px; align-items: flex-start;
        }
        .gsi-dir-note strong { color: var(--pcg-spotlight-purple); }
        .gsi-dir-note::before { content: "🧭"; font-size: 18px; flex: none; }

        .gsi-steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 16px; }
        .gsi-step { display: flex; flex-direction: column; gap: 8px; }
        .gsi-step .qn { display: flex; align-items: baseline; gap: 8px; }
        .gsi-step .num {
          display: inline-grid; place-items: center;
          width: 22px; height: 22px; border-radius: 50%;
          background: var(--surface-3); color: var(--text-tertiary);
          font-family: var(--font-mono); font-size: 11px; font-weight: 700;
        }
        .gsi-step.answered .num { background: var(--pcg-bright-blue); color: #001a2a; }
        .gsi-step .q {
          font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--text-primary);
        }
        .gsi-opts { display: flex; flex-direction: column; gap: 5px; }
        .gsi-opt {
          padding: 8px 12px; border-radius: var(--r-sm);
          background: var(--surface-2); border: 1px solid var(--border);
          cursor: pointer; font-size: 12.5px; color: var(--text-secondary);
          display: flex; align-items: center; gap: 8px;
        }
        .gsi-opt:hover { border-color: var(--pcg-bright-blue); }
        .gsi-opt.on {
          border-color: var(--pcg-bright-blue); color: var(--text-primary);
          background: linear-gradient(90deg, rgba(1,153,253,0.14), transparent 80%);
          font-weight: 500;
        }
        .gsi-opt .tag {
          margin-left: auto; font-family: var(--font-display); font-size: 9.5px;
          letter-spacing: 0.08em; text-transform: uppercase;
          padding: 1px 7px; border-radius: var(--r-pill); font-weight: 700;
        }
        .gsi-opt .tag.rec { background: rgba(61,220,132,0.16); color: var(--status-green); }
        .gsi-opt .tag.std { background: rgba(1,153,253,0.14);  color: var(--pcg-bright-blue); }
        .gsi-opt .tag.cx  { background: rgba(245,176,65,0.16); color: var(--status-amber); }

        .gsi-rules {
          padding: 14px 16px; border-radius: var(--r-sm);
          background: linear-gradient(135deg, rgba(245,176,65,0.06), transparent 70%), var(--surface-0);
          border: 1px solid var(--border); border-left: 3px solid var(--status-amber);
          margin-bottom: 16px;
        }
        .gsi-rules h4 {
          margin: 0 0 10px; font-family: var(--font-display); font-size: 12px;
          letter-spacing: 0.1em; text-transform: uppercase; color: var(--status-amber);
        }
        .gsi-rule {
          display: grid; grid-template-columns: 22px 1fr; gap: 8px;
          padding: 5px 0; font-size: 12.5px; color: var(--text-primary); line-height: 1.55;
          border-bottom: 1px dashed var(--border);
        }
        .gsi-rule:last-child { border-bottom: 0; }
        .gsi-rule .rico { font-family: var(--font-mono); font-weight: 700; font-size: 12px; color: var(--status-amber); line-height: 1.6; }
        .gsi-rule.labor .rico { color: var(--pcg-bright-blue); }
        .gsi-rule.gear  .rico { color: var(--status-green); }
        .gsi-rule.warn .rico  { color: var(--status-red); }
        .gsi-rule .why { display: block; font-size: 11px; color: var(--text-tertiary); margin-top: 1px; font-family: var(--font-mono); }
        .gsi-rule .auto-chip {
          margin-left: 6px; font-family: var(--font-display); font-size: 9px; letter-spacing: 0.08em;
          text-transform: uppercase; font-weight: 700;
          padding: 1px 6px; border-radius: var(--r-pill);
          background: rgba(149,100,216,0.16); color: var(--pcg-spotlight-purple);
        }

        .gsi-output {
          padding: 18px 20px; border-radius: var(--r-md);
          background: linear-gradient(135deg, rgba(1,153,253,0.14), rgba(149,100,216,0.10) 70%), var(--surface-0);
          border: 1px solid var(--pcg-bright-blue);
          margin-bottom: 16px;
        }
        .gsi-output h4 {
          margin: 0 0 10px; font-family: var(--font-display); font-size: 12px;
          letter-spacing: 0.12em; text-transform: uppercase; color: var(--pcg-bright-blue);
        }
        .gsi-stats {
          display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
          gap: 10px;
        }
        .gsi-stats .st {
          padding: 10px 12px; border-radius: var(--r-sm);
          background: rgba(255,255,255,0.03); border: 1px solid var(--border);
        }
        .gsi-stats .st .lbl { font-family: var(--font-display); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
        .gsi-stats .st .v   { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-primary); margin-top: 3px; }
        .gsi-stats .st .nt  { font-size: 10.5px; color: var(--text-secondary); margin-top: 2px; font-family: var(--font-mono); }

        .gsi-actions {
          display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
          padding-top: 14px; border-top: 1px dashed var(--border);
        }
        .gsi-actions .note { margin-left: auto; font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
      </style>

      <!-- Copy-from-prior modal -->
      <div class="modal-backdrop" id="cp-bd" onclick="closeCopy()"></div>
      <div class="modal-box" id="cp-box" style="max-width:640px; width:calc(100vw - 48px);">
        <button class="close" onclick="closeCopy()" style="position:absolute; top:10px; right:10px; background:transparent; border:0; color:var(--text-secondary); font-size:20px; cursor:pointer;">×</button>
        <h3>Copy from prior quote</h3>
        <div id="cp-body" style="margin-top:var(--sp-3); max-height: 60vh; overflow:auto;"></div>
      </div>

      <!-- Permission-aware margin banner -->
      <div id="margin-banner"></div>

      <!-- §YY Margin Risk Warnings (real-time) -->
      <div id="margin-warnings"></div>

      <!-- Quote Options (A/B/C pricing scenarios) + Revision Bar -->
      <div id="quote-options-bar" style="margin-bottom: var(--sp-3);"></div>

      <!-- View container -->
      <div class="card" style="overflow:hidden;">
        <div id="view-body"></div>
        <div class="qb-totals" id="qb-totals"></div>
      </div>

      <!-- ==============================================================
           🧩 SYSTEMS IN THIS QUOTE · first-class system instances.
           Every director-defined system inserted via the guided flow
           lands here as a live card. Reconfigure safely, view the
           rule-attributed breakdown, see director authority.
           ============================================================== -->
      <div class="card" id="sys-instances-card" style="margin-top: var(--sp-4); display: none;">
        <div class="card-header">
          <div class="title">🧩 Systems in this quote</div>
          <span class="muted" style="margin-left:auto; font-size:var(--fs-xs);" id="sys-instances-count">—</span>
        </div>
        <div class="card-body" id="sys-instances-body"></div>
      </div>

      <!-- Breakdown modal · rule-attributed gear + labor for an instance -->
      <div class="modal-backdrop" id="sbk-bd" onclick="closeBreakdown()"></div>
      <div class="modal-box" id="sbk-box" style="max-width:860px; width:calc(100vw - 48px); max-height: 92vh; overflow:auto;">
        <button class="close" onclick="closeBreakdown()" style="position:absolute; top:10px; right:10px; background:transparent; border:0; color:var(--text-secondary); font-size:20px; cursor:pointer;">×</button>
        <div id="sbk-body"></div>
      </div>

      <style>
        /* ---------- System instance cards ---------- */
        .sys-inst {
          padding: 16px 18px; border-radius: var(--r-md);
          background: var(--surface-1); border: 1px solid var(--border);
          margin-bottom: var(--sp-3);
          border-left: 3px solid var(--inst-color, var(--pcg-bright-blue));
          position: relative;
        }
        .sys-inst .head {
          display: grid; grid-template-columns: 40px 1fr auto; gap: 14px; align-items: center;
          margin-bottom: 10px;
        }
        .sys-inst .head .ico {
          width: 40px; height: 40px; border-radius: 10px;
          background: var(--inst-bg); color: var(--inst-color);
          display: grid; place-items: center; font-size: 20px;
        }
        .sys-inst .name { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .sys-inst .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 2px; line-height: 1.6; }
        .sys-inst .meta .v { color: var(--inst-color); font-weight: 700; }
        .sys-inst .meta .d { color: var(--text-secondary); }
        .sys-inst .pin {
          display: inline-flex; align-items: center; gap: 4px;
          padding: 2px 8px; border-radius: var(--r-pill);
          background: rgba(61,220,132,0.16); color: var(--status-green);
          border: 1px solid rgba(61,220,132,0.35);
          font-family: var(--font-display); font-size: 9.5px; letter-spacing: 0.08em;
          text-transform: uppercase; font-weight: 700; margin-left: 6px;
        }
        .sys-inst .actions { display: flex; gap: 6px; }
        .sys-inst .actions button {
          padding: 6px 11px; border-radius: var(--r-pill);
          border: 1px solid var(--border); background: var(--surface-2);
          color: var(--text-secondary); cursor: pointer;
          font-family: var(--font-display); font-size: 11px; letter-spacing: 0.04em; font-weight: 600;
        }
        .sys-inst .actions button:hover { border-color: var(--pcg-bright-blue); color: var(--pcg-bright-blue); }
        .sys-inst .actions button.primary { background: var(--pcg-bright-blue); color: #001a2a; border-color: var(--pcg-bright-blue); }

        .sys-inst .answers {
          display: flex; flex-wrap: wrap; gap: 6px;
          padding: 8px 0; border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border);
          margin-bottom: 10px;
        }
        .sys-inst .ans {
          font-family: var(--font-mono); font-size: 10.5px;
          padding: 2px 8px; border-radius: var(--r-pill);
          background: var(--surface-2); border: 1px solid var(--border);
          color: var(--text-secondary);
        }
        .sys-inst .ans b { color: var(--text-primary); font-weight: 600; }

        .sys-inst .summary {
          display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;
        }
        .sys-inst .sm {
          padding: 8px 10px; border-radius: var(--r-sm);
          background: var(--surface-0); border: 1px solid var(--border);
        }
        .sys-inst .sm .lbl {
          font-family: var(--font-display); font-size: 9px; letter-spacing: 0.08em;
          text-transform: uppercase; color: var(--text-tertiary);
        }
        .sys-inst .sm .v {
          font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text-primary); margin-top: 1px;
        }
        .sys-inst .rule-note {
          margin-top: 8px; font-size: 11px; color: var(--pcg-spotlight-purple); font-family: var(--font-mono);
        }
        .sys-inst[data-dept="video"]    { --inst-color: #0199fd; --inst-bg: rgba(1,153,253,0.14); }
        .sys-inst[data-dept="audio"]    { --inst-color: #f5b041; --inst-bg: rgba(245,176,65,0.14); }
        .sys-inst[data-dept="led"]      { --inst-color: #9564d8; --inst-bg: rgba(149,100,216,0.14); }
        .sys-inst[data-dept="lighting"] { --inst-color: #9564d8; --inst-bg: rgba(149,100,216,0.14); }
        .sys-inst[data-dept="general"]  { --inst-color: #3ddc84; --inst-bg: rgba(61,220,132,0.14); }

        /* ---------- Guardrails · required-rule lock chip ---------- */
        .gsi-rule.required { border-left-color: var(--status-red); background: linear-gradient(135deg, rgba(231,76,60,0.06), transparent 70%), var(--surface-0); }
        .gsi-rule .lock-chip {
          display: inline-flex; align-items: center; gap: 4px;
          margin-left: 6px; font-family: var(--font-display); font-size: 9px;
          letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700;
          padding: 1px 6px; border-radius: var(--r-pill);
          background: rgba(231,76,60,0.14); color: var(--status-red);
          border: 1px solid rgba(231,76,60,0.35);
        }
        .gsi-rule .lock-chip::before { content: "🔒"; margin-right: 2px; }
        .gsi-break-warn {
          margin-top: 12px; padding: 12px 14px;
          border-radius: var(--r-sm);
          background: linear-gradient(135deg, rgba(231,76,60,0.10), transparent 70%);
          border: 1px solid rgba(231,76,60,0.4); border-left: 3px solid var(--status-red);
        }
        .gsi-break-warn h4 {
          margin: 0 0 8px; font-family: var(--font-display); font-size: 11px;
          letter-spacing: 0.12em; text-transform: uppercase; color: var(--status-red);
        }
        .gsi-break-warn ul { margin: 0; padding: 0; list-style: none; }
        .gsi-break-warn li {
          padding: 3px 0; font-size: 12.5px; color: var(--text-primary);
          display: flex; gap: 8px;
        }
        .gsi-break-warn li::before { content: "🛑"; flex: none; }

        /* ---------- Reconfigure delta panel ---------- */
        .gsi-delta {
          margin: 10px 0 16px; padding: 14px 16px;
          border-radius: var(--r-sm);
          background: linear-gradient(135deg, rgba(1,153,253,0.08), rgba(149,100,216,0.05) 70%), var(--surface-0);
          border: 1px solid rgba(1,153,253,0.35); border-left: 3px solid var(--pcg-bright-blue);
        }
        .gsi-delta h4 {
          margin: 0 0 8px; font-family: var(--font-display); font-size: 11px;
          letter-spacing: 0.12em; text-transform: uppercase; color: var(--pcg-bright-blue);
        }
        .gsi-delta .row {
          display: grid; grid-template-columns: 60px 1fr; gap: 10px;
          padding: 4px 0; font-size: 12.5px; color: var(--text-primary);
          border-bottom: 1px dashed var(--border);
        }
        .gsi-delta .row:last-child { border-bottom: 0; }
        .gsi-delta .tg {
          font-family: var(--font-display); font-size: 10px; letter-spacing: 0.08em;
          text-transform: uppercase; font-weight: 700;
        }
        .gsi-delta .tg.add   { color: var(--status-green); }
        .gsi-delta .tg.rem   { color: var(--status-red); }
        .gsi-delta .tg.same  { color: var(--text-tertiary); }

        /* ---------- Breakdown modal ---------- */
        .sbk-head {
          display: grid; grid-template-columns: 44px 1fr auto; gap: 14px; align-items: center;
          padding-bottom: 14px; margin-bottom: 16px;
          border-bottom: 1px solid var(--border);
        }
        .sbk-head .ico { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; font-size: 22px; }
        .sbk-head h3 { margin: 0; font-family: var(--font-display); font-size: 18px; }
        .sbk-head .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

        .sbk-two { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 720px) { .sbk-two { grid-template-columns: 1fr; } }

        .sbk-list-card {
          padding: 14px 16px; border-radius: var(--r-sm);
          background: var(--surface-0); border: 1px solid var(--border);
        }
        .sbk-list-card h4 {
          margin: 0 0 10px; font-family: var(--font-display); font-size: 11px;
          letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary);
          display: flex; align-items: center; gap: 8px;
        }
        .sbk-list-card h4 .cnt {
          margin-left: auto; font-family: var(--font-mono); font-size: 10.5px;
          padding: 1px 7px; border-radius: var(--r-pill);
          background: var(--surface-2); border: 1px solid var(--border); color: var(--text-tertiary); letter-spacing: 0;
        }
        .sbk-row {
          display: grid; grid-template-columns: 1fr auto; gap: 10px;
          padding: 8px 0; border-bottom: 1px dashed var(--border);
        }
        .sbk-row:last-child { border-bottom: 0; }
        .sbk-row .item {
          font-size: 12.5px; color: var(--text-primary); font-weight: 500;
        }
        .sbk-row .attr {
          font-size: 10.5px; color: var(--text-tertiary); font-family: var(--font-mono); margin-top: 2px;
        }
        .sbk-row .origin {
          font-family: var(--font-display); font-size: 9px; letter-spacing: 0.08em;
          text-transform: uppercase; font-weight: 700;
          padding: 2px 7px; border-radius: var(--r-pill); white-space: nowrap;
        }
        .sbk-row .origin.base { background: var(--surface-2); color: var(--text-tertiary); border: 1px solid var(--border); }
        .sbk-row .origin.rule { background: rgba(149,100,216,0.16); color: var(--pcg-spotlight-purple); border: 1px solid rgba(149,100,216,0.35); }
        .sbk-row .origin.req  { background: rgba(231,76,60,0.14); color: var(--status-red); border: 1px solid rgba(231,76,60,0.35); }

        .sbk-foot {
          margin-top: 14px; padding: 10px 14px;
          border-radius: var(--r-sm);
          background: rgba(149,100,216,0.06); border: 1px dashed rgba(149,100,216,0.3);
          font-size: 11.5px; color: var(--text-secondary); line-height: 1.55;
        }
        .sbk-foot strong { color: var(--pcg-spotlight-purple); }
      </style>

      <!-- Availability + approval sidebar -->
      <div class="split" style="margin-top:var(--sp-5);">
        <div>
          <div class="card">
            <div class="card-header"><div class="title">Line Availability Ledger</div><span class="muted" style="margin-left:auto; font-size:var(--fs-xs);">§3.1 contract</span></div>
            <div class="card-body" id="avail-ledger"></div>
          </div>
        </div>
        <aside>
          <div class="card">
            <div class="card-header"><div class="title">Approvals & Guards</div></div>
            <div class="card-body" id="guards"></div>
          </div>
          <div class="card" style="margin-top:var(--sp-4);">
            <div class="card-header"><div class="title">Revisions</div></div>
            <div class="card-body" id="revisions"></div>
          </div>
          <div class="card" style="margin-top:var(--sp-4);">
            <div class="card-header"><div class="title">Internal Corrections</div></div>
            <div class="card-body" id="corrections"></div>
          </div>
        </aside>
      </div>
    </div>
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/permissions.js"></script>
<script src="assets/engines.js"></script>
<script src="assets/api.js"></script>
<script src="assets/seed.js"></script>
<script src="assets/app.js"></script>
<script src="assets/system-defs.js"></script>
<script>
  const qid = PCG.qs("id","q.LCE-2026.v3");
  const quote = PCG.api.getQuote(qid) || PCG.api.getQuotes()[0];
  const rev = PCG.api.getQuoteRevision(quote.activeRevisionId);
  const project = PCG.api.getProject(quote.projectCode);
  const show = PCG.api.getShow(quote.projectCode);
  const canSeeMargin = PCG.canSeeTier('T2_MARGINS');

  PCG.mountShell({
    active:'quote',
    crumbs:[
      {label:'Portfolio', href:'index.html'},
      {label:project.code, href:`project.html?project=${project.code}`},
      {label:`Quote ${quote.quoteNo}`}
    ],
    pageActions: `<a class="btn" href="playbook.html?project=${project.code}">Playbook</a>`
  });

  // -------- Header --------
  const editableByMe = PCG.engines.pricing.canEditRevision(rev);
  document.getElementById('q-header').innerHTML = `
    <section class="proj-header">
      <div class="motif"></div>
      <div class="eyebrow">${quote.quoteNo} · Rev ${rev.revisionNumber} · ${rev.status.toUpperCase()} · ${PCG.lifecyclePill(show.lifecycleState)}</div>
      <h1>Quote — ${PCG.escapeHtml(project.name)}</h1>
      <div class="meta">
        <div class="i"><span class="k">Client</span><span class="v">${PCG.escapeHtml(project.client)}</span></div>
        <div class="i"><span class="k">Rate Card</span><span class="v mono">${rev.rateCardVersionId||'—'}</span></div>
        <div class="i"><span class="k">Revenue</span><span class="v mono">${PCG.money(rev.totalRevenue)}</span></div>
        ${canSeeMargin ? `
          <div class="i"><span class="k">Cost</span><span class="v mono">${PCG.money(rev.totalCost)}</span></div>
          <div class="i"><span class="k">Margin</span><span class="v mono">${PCG.pct(rev.margin)}</span></div>` : ''}
        <div class="i"><span class="k">Lines</span><span class="v mono">${(rev.lines||[]).length}</span></div>
        <div class="i"><span class="k">Terms</span><span class="v">${PCG.escapeHtml(quote.termsText||'—')}</span></div>
        <div class="i"><span class="k">Status</span><span class="v">${rev.status==='Awarded'?'<span class="pill green">AWARDED · IMMUTABLE</span>':rev.status==='Issued'?'<span class="pill blue">ISSUED</span>':'<span class="pill amber">DRAFT</span>'}</span></div>
        <div class="i"><span class="k">You may edit?</span><span class="v">${editableByMe?'<span class="pill green">YES</span>':'<span class="pill gray">READ-ONLY</span>'}</span></div>
      </div>
    </section>`;

  // -------- §YY Margin risk warnings (real-time) --------
  function renderMarginWarnings(){
    if(!canSeeMargin){ document.getElementById('margin-warnings').innerHTML=''; return; }
    const warnings = PCG.engines.pricing.computeMarginWarnings(rev);
    if(!warnings.length){ document.getElementById('margin-warnings').innerHTML=''; return; }
    document.getElementById('margin-warnings').innerHTML = `
      <div class="card" style="margin-bottom: var(--sp-4); border: 1px solid ${warnings.some(w=>w.level==='high')?'var(--status-red)':'var(--status-amber)'};">
        <div class="card-header" style="background: ${warnings.some(w=>w.level==='high')?'rgba(178,56,56,0.08)':'rgba(212,163,47,0.08)'};">
          <div class="title">⚠ Margin Risk · ${warnings.length} trigger${warnings.length===1?'':'s'}</div>
          <span class="muted" style="margin-left:auto; font-size:var(--fs-xs);">Spec §YY — real-time evaluation on every line change</span>
        </div>
        <div class="card-body" style="padding: 12px 16px;">
          ${warnings.slice(0,6).map(w => `
            <div style="padding: 6px 0; border-bottom: 1px dashed var(--border); display:grid; grid-template-columns: 80px 120px 1fr; gap:10px; align-items:center; font-size:var(--fs-sm);">
              <span class="pill ${w.level==='high'?'red':'amber'} plain" style="font-size:10px;">${w.level.toUpperCase()}</span>
              <span class="mono" style="font-size:10px; color: var(--text-tertiary);">${w.kind}</span>
              <span>${PCG.escapeHtml(w.message)}</span>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // -------- Margin banner / permission cue --------
  document.getElementById('margin-banner').innerHTML = canSeeMargin ? '' : `
    <div class="attn-item blue" style="margin-bottom:var(--sp-4);">
      <div><div class="ttl">🔒 Cost & margin columns hidden</div>
      <div class="meta">This view is permission-redacted at the API layer (Tier-2). Switch to Director / AE / Admin / Accounting to see cost.</div></div>
    </div>`;

  // -------- Views --------
  const V = {};

  V.working = () => `
    <div style="overflow-x:auto;">
      <table class="qb-line-grid">
        <thead>
          <tr><th style="width:32px;">#</th><th>Item / Description + Rate Model</th><th style="width:64px; text-align:right;">Qty</th><th style="width:90px; text-align:right;">Rate</th><th style="width:60px; text-align:right;">Days</th><th style="width:110px; text-align:right;">Extended</th><th style="width:120px;">Availability</th><th style="width:32px;"></th></tr>
        </thead>
        <tbody id="tb-working"></tbody>
      </table>
    </div>`;

  V.profit = () => !canSeeMargin ? PCG.states.forbidden() : `
    <div style="overflow-x:auto;">
      <table class="qb-line-grid">
        <thead>
          <tr><th>Item</th><th>Qty</th><th>Rate</th><th>Cost</th><th>Ext. Rev</th><th>Ext. Cost</th><th>Margin $</th><th>Margin %</th><th>Floor?</th></tr>
        </thead>
        <tbody id="tb-profit"></tbody>
      </table>
    </div>`;

  V.change = () => `
    <div class="card-body">
      <div class="muted" style="font-size:var(--fs-sm); margin-bottom:var(--sp-3);">Scope change vs frozen <strong>ScopeRecord</strong> (baseline on award). Two tracks: <strong>Internal Correction</strong> (zero financial impact, no client notification) vs <strong>Formal Change Order</strong> (financial impact, client-visible, billing queue).</div>
      <div class="grid-2">
        <div><h4 style="margin-bottom:var(--sp-3);">Internal Corrections</h4><div id="corrections-list"></div></div>
        <div><h4 style="margin-bottom:var(--sp-3);">Change Orders (CO) · Add Orders · Damage</h4><div id="co-list"></div></div>
      </div>
    </div>`;

  V.warehouse = () => `
    <div class="card-body">
      <div class="muted" style="font-size:var(--fs-sm); margin-bottom:var(--sp-3);">Warehouse view: groups lines by department, surfaces Walk-the-Pile readiness, pull status, and sub-rental backstops.</div>
      <table class="pcg-table">
        <thead><tr><th>Department</th><th>Qty on Quote</th><th>Pull Status</th><th>Walk-the-Pile</th><th>Sub-Rental?</th></tr></thead>
        <tbody id="tb-warehouse"></tbody>
      </table>
    </div>`;

  V.labor = () => !PCG.canSeeTier('T3_BILL_RATES') ? PCG.states.forbidden() : `
    <div class="card-body">
      <div style="display:flex; align-items:center; gap: var(--sp-3); margin-bottom: var(--sp-3);">
        <div class="muted" style="font-size:var(--fs-sm);">Quote labor lines bind to <strong>CrewPosition</strong>. On Award, each line auto-seeds a <strong>Placeholder ShiftAssignment</strong> — Labor Coord picks up in <a href="crew-assign.html?project=${project.code}">Assign Crew</a>.</div>
        ${editableByMe ? '<button class="btn sm" id="addLaborBtn" style="margin-left:auto;">＋ Add Labor Line</button>' : ''}
      </div>
      <table class="pcg-table">
        <thead><tr><th>Position (CrewPosition)</th><th style="width:70px;">Qty</th><th style="width:70px;">Days</th><th>Bill Rate</th>${PCG.canSeeTier('T1_CREW_PAY_RATES')?'<th>Pay Rate</th>':''}<th>Ext. Rev</th>${editableByMe?'<th></th>':''}</tr></thead>
        <tbody id="tb-labor"></tbody>
      </table>
      <div style="margin-top: var(--sp-4); padding: var(--sp-3); background: var(--surface-2); border-radius: var(--r-sm); font-size: var(--fs-xs); color: var(--text-secondary);">
        <strong style="color: var(--text-primary);">On Award:</strong>
        ${(rev.lines||[]).filter(l=>l.type==='Labor').reduce((s,l)=>s+(l.qty||1),0)} Placeholder ShiftAssignments will be seeded on ${project.code} with positionGroup derived from department.
        Labor Coordinator fills each slot from the crew pool.
      </div>
    </div>`;

  // -------- Row renderers --------
  const findItem = id => PCG.api.getInventoryItem(id);

  const renderWorking = () => {
    const groups = {};
    (rev.lines||[]).forEach(l => { (groups[l.packageName] = groups[l.packageName] || []).push(l); });
    const tb = document.getElementById('tb-working');
    const client = quote && quote.clientId ? PCG.api.getClient(quote.clientId) : null;
    const clientDisc = client && client.discountPct ? Math.round(client.discountPct*100) : 0;
    let i = 0;
    let html = '';
    Object.entries(groups).forEach(([pkg, lines])=>{
      html += `<tr class="pkg-header"><td colspan="8">${PCG.escapeHtml(pkg)}</td></tr>`;
      lines.forEach(l=>{
        i++;
        const ext = (l.unitPrice||0) * (l.qty||0) * (l.days||1);
        const inv = l.inventoryItemId ? findItem(l.inventoryItemId) : null;
        const rates = (inv && inv.rates) || {};
        const isLabor = l.type === 'Labor';
        const currentTier = l.rateTier || 'day';

        // Build rate-model options — only show tiers that exist on the inventory item
        const tierOpts = [];
        if(rates.day != null || isLabor) tierOpts.push({v:'day', label:`Day${rates.day!=null?' · '+PCG.money(rates.day):''}`});
        if(rates.week != null) tierOpts.push({v:'week', label:'Week · '+PCG.money(rates.week)});
        if(rates.twoWeek != null) tierOpts.push({v:'twoWeek', label:'2-Week · '+PCG.money(rates.twoWeek)});
        if(rates.fourWeek != null) tierOpts.push({v:'fourWeek', label:'4-Week · '+PCG.money(rates.fourWeek)});
        if(client && client.discountPct) tierOpts.push({v:'client', label:`Client · ${client.name.split(' ')[0]} -${clientDisc}%`});
        tierOpts.push({v:'custom', label:'Custom rate'});

        const rateSelect = editableByMe && !isLabor ? `
          <select onchange="updateRental('${l.id}','rateTier',this.value)"
                  style="background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:2px 6px; border-radius:var(--r-sm); font-size:11px; margin-bottom:2px; width:100%;">
            ${tierOpts.map(t => `<option value="${t.v}" ${t.v===currentTier?'selected':''}>${PCG.escapeHtml(t.label)}</option>`).join('')}
          </select>` : `<div style="font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.06em;">${currentTier}</div>`;

        const qtyCell = editableByMe && !isLabor
          ? `<input type="number" min="0" step="1" value="${l.qty||0}" onchange="updateRental('${l.id}','qty',parseInt(this.value,10)||0)" style="width:52px; background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:3px 6px; border-radius:var(--r-sm); font-family:var(--font-mono); text-align:right;"/>`
          : `<span class="mono">${l.qty||0}</span>`;

        const rateCell = editableByMe && !isLabor
          ? `<input type="number" min="0" step="0.01" value="${l.unitPrice||0}" onchange="updateRental('${l.id}','unitPrice',parseFloat(this.value)||0); document.getElementById('rateSelect-${l.id}')?.setAttribute('data-custom','1')" style="width:80px; background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:3px 6px; border-radius:var(--r-sm); font-family:var(--font-mono); text-align:right;"/>`
          : `<span class="mono">${PCG.money(l.unitPrice)}</span>`;

        const daysCell = editableByMe && !isLabor
          ? `<input type="number" min="0.25" step="0.25" value="${l.days||1}" onchange="updateRental('${l.id}','days',parseFloat(this.value)||1)" style="width:52px; background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:3px 6px; border-radius:var(--r-sm); font-family:var(--font-mono); text-align:right;"/>`
          : `<span class="mono">${l.days||1}</span>`;

        const discBadge = l.clientDiscountPct ? `<span class="pill blue plain" style="font-size:9px; margin-left:4px;">-${Math.round(l.clientDiscountPct*100)}%</span>` : '';

        html += `
          <tr id="ln-${l.id}">
            <td class="mono muted">${i}</td>
            <td>
              ${PCG.escapeHtml(l.description)}${discBadge}
              ${!isLabor ? `<div id="rateSelect-${l.id}" style="margin-top:3px;">${rateSelect}</div>` : `<div style="font-size:10px; color:var(--text-tertiary); margin-top:2px;">LABOR</div>`}
            </td>
            <td class="mono" style="text-align:right;">${qtyCell}</td>
            <td class="mono" style="text-align:right;">${rateCell}</td>
            <td class="mono" style="text-align:right;">${daysCell}</td>
            <td class="mono" style="text-align:right; font-weight:600;">${PCG.money(ext)}</td>
            <td id="avail-${l.id}" class="mono muted">…</td>
            <td>${editableByMe && !isLabor ? `<button class="btn sm ghost" onclick="removeRental('${l.id}')" style="font-size:11px; padding:2px 6px;">✕</button>` : ''}</td>
          </tr>`;
      });
    });
    tb.innerHTML = html;
    runAvailChecks();
  };

  // ---- Rental line editing (§EE) ----
  window.updateRental = (lineId, field, value) => {
    try {
      const patch = { [field]: value };
      PCG.api.updateQuoteLine(rev.id, lineId, patch);
      renderWorking();
      renderProfit();
      renderTotals();
    } catch(e){ alert('Update failed: '+e.message); }
  };
  window.removeRental = (lineId) => {
    if(!confirm('Remove this line from the quote?')) return;
    try {
      PCG.api.removeQuoteLine(rev.id, lineId);
      renderWorking();
      renderProfit();
      renderTotals();
    } catch(e){ alert('Remove failed: '+e.message); }
  };

  const renderProfit = () => {
    const tb = document.getElementById('tb-profit'); if(!tb) return;
    let html = '';
    (rev.lines||[]).forEach(l=>{
      const extRev = (l.unitPrice||0) * (l.qty||0) * (l.days||1);
      const extCost = PCG.engines.cost.costForLine(l) * (l.qty||0) * (l.days||1);
      const margin = extRev - extCost;
      const pct = extRev ? margin/extRev : 0;
      const floor = pct < 0.30 ? '<span class="pill red">BELOW FLOOR</span>' :
                    pct < 0.50 ? '<span class="pill amber">WATCH</span>' :
                    '<span class="pill green">OK</span>';
      html += `<tr>
        <td>${PCG.escapeHtml(l.description)}</td>
        <td class="mono">${l.qty}</td>
        <td class="mono">${PCG.money(l.unitPrice)}</td>
        <td class="mono">${PCG.money(PCG.engines.cost.costForLine(l))}</td>
        <td class="mono">${PCG.money(extRev)}</td>
        <td class="mono">${PCG.money(extCost)}</td>
        <td class="mono">${PCG.money(margin)}</td>
        <td class="mono">${PCG.pct(pct)}</td>
        <td>${floor}</td>
      </tr>`;
    });
    tb.innerHTML = html;
  };

  const renderChange = () => {
    const ic = rev.corrections || [];
    const cos = PCG.api.getChangeOrders({projectCode: project.code}) || [];
    document.getElementById('corrections-list').innerHTML = ic.length ? ic.map(c=>`
      <div class="attn-item" style="margin-bottom:6px;"><div><div class="ttl">${PCG.escapeHtml(c.summary||'Correction')}</div><div class="meta">${PCG.fmtDate(c.at,{time:true})} · by ${PCG.escapeHtml(PCG.findPerson(c.by)?.name || c.by)} · ${c.type||'internal'}</div></div></div>
    `).join('') : PCG.states.empty('No internal corrections on file.');
    document.getElementById('co-list').innerHTML = cos.length ? cos.map(c=>{
      const pill = c.type==='CO'?'<span class="pill blue">CO</span>':c.type==='AddOrder'?'<span class="pill purple">ADD ORDER</span>':'<span class="pill amber">DAMAGE</span>';
      const fi = canSeeMargin ? PCG.money(c.financialImpact) : '—';
      return `<div class="attn-item" style="margin-bottom:6px;"><div><div class="ttl">${pill} ${PCG.escapeHtml(c.description)}</div><div class="meta">Impact ${fi} · Status ${c.status}</div></div></div>`;
    }).join('') : PCG.states.empty('No open change orders.');
  };

  const renderWarehouse = () => {
    const tb = document.getElementById('tb-warehouse'); if(!tb) return;
    const byDept = {};
    (rev.lines||[]).filter(l=>l.type==='Rental').forEach(l=>{
      const inv = findItem(l.inventoryItemId);
      const cat = (PCG.inventoryCategories||[]).find(c=>c.id===(inv&&inv.categoryId));
      const dept = (cat&&cat.department) || 'Mixed';
      byDept[dept] = byDept[dept] || { qty:0, lines:[] };
      byDept[dept].qty += (l.qty||0);
      byDept[dept].lines.push(l);
    });
    const pulls = PCG.api.getPullSheets(show.id);
    tb.innerHTML = Object.entries(byDept).map(([dept, data])=>{
      const ps = pulls.find(p=>p.department===dept);
      const pullStatus = ps?ps.status:'Not Started';
      const walk = ps && ps.authorizedById ? `<span class="pill green">✓ AUTHORIZED</span>` : `<span class="pill amber">PENDING</span>`;
      const hasSub = (PCG.api.getSubRentals({showId:show.id})||[]).some(r=>{
        const inv = findItem(r.itemId); const c = (PCG.inventoryCategories||[]).find(c=>c.id===(inv&&inv.categoryId));
        return c && c.department === dept;
      });
      return `<tr><td><strong>${PCG.escapeHtml(dept)}</strong></td><td class="mono">${data.qty}</td><td>${pullStatus}</td><td>${walk}</td><td>${hasSub?'Yes':'—'}</td></tr>`;
    }).join('') || '<tr><td colspan="5" class="empty">No rental lines yet.</td></tr>';
  };

  const renderLabor = () => {
    const tb = document.getElementById('tb-labor'); if(!tb) return;
    const labor = (rev.lines||[]).filter(l=>l.type==='Labor');
    const cols = editableByMe ? 7 : 6;
    tb.innerHTML = labor.map(l=>{
      const pos = PCG.api.getCrewPosition(l.crewPositionId);
      const rate = pos && pos.ratesByVersion && pos.ratesByVersion[0];
      const billRate = rate?.billRate ?? '—';
      const payRate  = rate?.payRate  ?? '—';
      const extRev = (l.unitPrice||0) * (l.qty||0) * (l.days||1);
      return `<tr>
        <td>
          ${editableByMe ? `
            <select onchange="updateLaborLine('${l.id}','crewPositionId',this.value)" style="background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:4px 8px; border-radius:var(--r-sm); font-size:var(--fs-sm); min-width:240px;">
              <option value="">— Select position —</option>
              ${(PCG.crewPositions||[]).map(p=>`<option value="${p.id}" ${p.id===l.crewPositionId?'selected':''}>${PCG.escapeHtml(p.name)}</option>`).join('')}
            </select>
          ` : `<strong>${PCG.escapeHtml(pos?pos.name:l.description)}</strong>`}
          <div class="muted" style="font-size:11px; margin-top:2px;">${PCG.escapeHtml(l.description||'')} ${pos?`· <span class="pill gray plain" style="font-size:9px;">${PCG.escapeHtml((pos.department||'—').toUpperCase())}</span>`:''}</div>
        </td>
        <td class="mono">${editableByMe ? `<input type="number" min="1" value="${l.qty}" onchange="updateLaborLine('${l.id}','qty',parseInt(this.value,10))" style="width:48px; background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:4px 6px; border-radius:var(--r-sm); font-family:var(--font-mono);"/>` : l.qty}</td>
        <td class="mono">${editableByMe ? `<input type="number" min="1" step="0.25" value="${l.days}" onchange="updateLaborLine('${l.id}','days',parseFloat(this.value))" style="width:48px; background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:4px 6px; border-radius:var(--r-sm); font-family:var(--font-mono);"/>` : l.days}</td>
        <td class="mono">${typeof billRate==='number'?PCG.money(billRate):billRate}</td>
        ${PCG.canSeeTier('T1_CREW_PAY_RATES')?`<td class="mono">${typeof payRate==='number'?PCG.money(payRate):payRate}</td>`:''}
        <td class="mono" style="font-weight:600;">${PCG.money(extRev)}</td>
        ${editableByMe ? `<td><button class="btn sm ghost" onclick="removeLaborLine('${l.id}')" style="font-size:11px;">✕</button></td>`:''}
      </tr>`;
    }).join('') || `<tr><td colspan="${cols}" class="empty">No labor lines quoted yet. ${editableByMe?'Click <strong>＋ Add Labor Line</strong> above.':''}</td></tr>`;

    const addBtn = document.getElementById('addLaborBtn');
    if(addBtn) addBtn.addEventListener('click', addLaborLine);
  };

  function addLaborLine(){
    rev.lines = rev.lines || [];
    const newLine = {
      id: 'qln.'+Math.random().toString(36).slice(2,8),
      packageName: 'Labor',
      type: 'Labor',
      crewPositionId: '',
      description: '',
      qty: 1, rateTier:'day', unitPrice: 0, days: 1,
      cost: 0, marginContribution: 0
    };
    rev.lines.push(newLine);
    renderLabor();
    renderTotals();
  }

  function updateLaborLine(id, field, value){
    const l = (rev.lines||[]).find(x=>x.id===id);
    if(!l) return;
    l[field] = value;
    // If position changed, sync unitPrice + description
    if(field==='crewPositionId'){
      const pos = PCG.api.getCrewPosition(value);
      if(pos && pos.ratesByVersion && pos.ratesByVersion[0]){
        l.unitPrice = pos.ratesByVersion[0].billRate || 0;
        l.cost = pos.ratesByVersion[0].payRate || 0;
      }
      l.description = pos ? pos.displayName || pos.name : l.description;
    }
    renderLabor();
    renderTotals();
  }

  function removeLaborLine(id){
    rev.lines = (rev.lines||[]).filter(x=>x.id!==id);
    renderLabor();
    renderTotals();
  }

  window.addLaborLine = addLaborLine;
  window.updateLaborLine = updateLaborLine;
  window.removeLaborLine = removeLaborLine;

  // -------- Availability checks (uses engine) --------
  const runAvailChecks = () => {
    (rev.lines||[]).filter(l=>l.type==='Rental').forEach(l=>{
      const cell = document.getElementById(`avail-${l.id}`);
      if(!cell) return;
      const res = PCG.api.checkAvailability({
        itemId: l.inventoryItemId, qty: l.qty,
        fromDate: project.dates.loadIn, toDate: project.dates.ret,
        excludeShowId: project.code, holdType:'provisional'
      });
      if(res.status==='available') cell.innerHTML = `<span class="avail-dot available"></span>AVAIL ${res.available}`;
      else if(res.status==='partial') cell.innerHTML = `<span class="avail-dot partial"></span>PARTIAL ${res.available}/${res.required}`;
      else if(res.status==='conflict') cell.innerHTML = `<span class="avail-dot conflict"></span>CONFLICT ·&nbsp;<a href="eqlpc.html">resolve</a>`;
      else cell.innerHTML = `<span class="avail-dot error"></span>${res.code||'—'}`;
    });
    renderAvailLedger();
  };

  const renderAvailLedger = () => {
    const el = document.getElementById('avail-ledger');
    if(!el) return;
    const rows = (rev.lines||[]).filter(l=>l.type==='Rental').map(l=>{
      const res = PCG.api.checkAvailability({
        itemId:l.inventoryItemId, qty:l.qty,
        fromDate: project.dates.loadIn, toDate: project.dates.ret,
        excludeShowId: project.code, holdType:'provisional'
      });
      let cls = 'ok', txt = `AVAIL ${res.available||0}`;
      if(res.status==='partial'){ cls='part'; txt = `PARTIAL — deficit ${res.deficit}`; }
      if(res.status==='conflict'){ cls='conflict'; txt = `CONFLICT · ${(res.conflicts||[]).length} show(s)`; }
      if(res.status==='error')   { cls='conflict'; txt = res.code; }
      const inv = findItem(l.inventoryItemId);
      return `
        <div class="q-row" style="grid-template-columns: 1fr 200px;">
          <div>
            <div class="why">${PCG.escapeHtml(inv?inv.name:l.description)} <span class="mono muted">× ${l.qty}</span></div>
            <div class="ctx">${PCG.escapeHtml(l.packageName)} · ${PCG.fmtShort(project.dates.loadIn)} → ${PCG.fmtShort(project.dates.ret)}</div>
          </div>
          <div><div class="avail-result ${cls}">${txt}</div></div>
        </div>`;
    }).join('');
    el.innerHTML = rows || PCG.states.empty('No rental lines to check.');
  };

  // -------- Totals --------
  const renderTotals = () => {
    const t = PCG.engines.pricing.computeRevisionTotals(rev.lines);
    // Apply revision-level discount if set
    const disc = rev.discount;
    let discAmount = 0;
    if(disc){
      discAmount = disc.type === 'percent'
        ? Math.round(t.totalRevenue * disc.value * 100) / 100
        : (disc.value || 0);
    }
    const netRevenue = Math.max(0, t.totalRevenue - discAmount);
    const netMargin = canSeeMargin && netRevenue ? ((netRevenue - t.totalCost) / netRevenue) : 0;
    rev.totalRevenue = netRevenue;
    rev.grossRevenue = t.totalRevenue;
    rev.discountAmount = discAmount;
    rev.totalCost = t.totalCost;
    rev.margin = netMargin;
    const el = document.getElementById('qb-totals');
    el.innerHTML = `
      <div class="cell">Gross<strong>${PCG.money(t.totalRevenue)}</strong></div>
      <div class="cell" style="min-width:140px;">Discount
        <strong style="color:${disc?'var(--status-amber)':'var(--text-tertiary)'};">
          ${disc ? '-'+PCG.money(discAmount)+(disc.type==='percent'?` (${Math.round(disc.value*100)}%)`:'') : '—'}
        </strong>
        ${editableByMe ? `<button class="btn sm ghost" onclick="openDiscountModal()" style="font-size:10px; padding:2px 6px; margin-top:3px;">${disc?'Edit':'＋ Add'}</button>${disc?`<button class="btn sm ghost" onclick="clearDiscount()" style="font-size:10px; padding:2px 6px; margin-top:3px; margin-left:3px;">✕</button>`:''}` : ''}
      </div>
      <div class="cell">Net<strong>${PCG.money(netRevenue)}</strong></div>
      ${canSeeMargin ? `<div class="cell">Cost<strong>${PCG.money(t.totalCost)}</strong></div>
      <div class="cell">Margin<strong>${PCG.pct(netMargin)}</strong></div>` : ''}
      <div class="cell">Lines<strong>${(rev.lines||[]).length}</strong></div>
      <div class="cell">Revision<strong>v${rev.revisionNumber}</strong></div>
    `;
    renderMarginWarnings();
  };

  // ---- Discount modal ----
  window.openDiscountModal = () => {
    const existing = rev.discount || { type:'percent', value:0, reason:'' };
    const client = quote && quote.clientId ? PCG.api.getClient(quote.clientId) : null;
    const suggestedPct = client && client.discountPct ? Math.round(client.discountPct*100) : 0;
    const suggestion = suggestedPct ? `\n\n💡 ${client.name} partner tier (${client.partnerTier||'—'}) suggests ${suggestedPct}% — ${client.discountReason||''}` : '';
    const type = prompt(`Discount type: "percent" or "amount"${suggestion}`, existing.type);
    if(!type) return;
    if(type !== 'percent' && type !== 'amount'){ alert('Type must be "percent" or "amount".'); return; }
    const rawVal = prompt(type==='percent' ? 'Discount percent (e.g. 10 for 10%):' : 'Discount amount in dollars:', type==='percent' ? (existing.value*100) : existing.value);
    if(rawVal === null) return;
    const num = parseFloat(rawVal);
    if(isNaN(num) || num < 0){ alert('Enter a non-negative number.'); return; }
    const value = type==='percent' ? num/100 : num;
    const reason = prompt('Reason (required — audit log):', existing.reason || (client&&client.discountReason) || '');
    if(!reason){ alert('Reason required.'); return; }
    try {
      PCG.api.setRevisionDiscount(rev.id, { type, value, reason, level:'total' });
      renderTotals();
    } catch(e){ alert('Discount failed: '+e.message); }
  };
  window.clearDiscount = () => {
    if(!confirm('Remove the discount?')) return;
    try {
      PCG.api.setRevisionDiscount(rev.id, { type:'percent', value:0, reason:'Cleared', level:'total' });
      rev.discount = null;
      renderTotals();
    } catch(e){ alert(e.message); }
  };

  // -------- Guards + Revisions + Corrections --------
  document.getElementById('guards').innerHTML = `
    <div style="font-size:var(--fs-sm);">
      <div class="eyebrow" style="margin-bottom:4px;">Approval Guards</div>
      <ul style="margin:0; padding-left:18px;">
        <li>Discount > 10% → CSO/Director approval (hardcoded Phase 1-4)</li>
        <li>CO &gt; $${PCG.engines.pricing.CO_DIRECTOR_THRESHOLD.toLocaleString()} → Director approval</li>
        <li>Sub-rental RPO &gt; $10,000 → CFO approval</li>
        <li>Awarded revisions are immutable; only Internal Corrections by Scheduling + Admin</li>
      </ul>
    </div>`;

  document.getElementById('revisions').innerHTML = (PCG.quoteRevisions||[])
    .filter(r=>r.quoteId===quote.id)
    .sort((a,b)=>b.revisionNumber - a.revisionNumber)
    .map(r=>`<div class="pinned" style="margin-bottom:6px;">
      <span class="icon mono">v${r.revisionNumber}</span>
      <div><strong>${r.status}</strong><div class="muted" style="font-size:var(--fs-xs);">${PCG.fmtDate(r.approvedAt||r.createdAt)}${r.approvedById?' · '+(PCG.findPerson(r.approvedById)?.name||r.approvedById):''}</div></div>
    </div>`).join('') || PCG.states.empty('No revisions.');

  document.getElementById('corrections').innerHTML = (rev.corrections||[]).length
    ? (rev.corrections||[]).map(c=>`<div class="change-ribbon"><div class="when">${PCG.fmtShort(c.at)}</div><div>${PCG.escapeHtml(c.summary||'Correction')}<div class="meta">by ${PCG.escapeHtml(PCG.findPerson(c.by)?.name||c.by)}</div></div></div>`).join('')
    : PCG.states.empty('None.');

  // -------- Options + Revision bar --------
  function renderOptionsBar(){
    const bar = document.getElementById('quote-options-bar');
    if(!bar) return;
    const opts = rev.options || [];
    const allRevs = (PCG.quoteRevisions||[]).filter(r => r.quoteId === quote.id).sort((a,b) => (a.revisionNumber||0) - (b.revisionNumber||0));

    const revPicker = allRevs.length > 1 ? `
      <div style="display:flex; align-items:center; gap:6px; margin-right:var(--sp-3);">
        <span class="muted" style="font-size:10px; letter-spacing:0.08em; text-transform:uppercase;">Revision</span>
        <select onchange="switchRevision(this.value)" style="background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:4px 8px; border-radius:var(--r-sm); font-size:var(--fs-sm);">
          ${allRevs.map(r => `<option value="${r.id}" ${r.id===rev.id?'selected':''}>v${r.revisionNumber} · ${r.status}${r.id===quote.activeRevisionId?' · ACTIVE':''}</option>`).join('')}
        </select>
      </div>` : '';

    const optionsHtml = opts.length ? `
      <div style="display:flex; gap:var(--sp-2); flex-wrap:wrap; flex:1;">
        ${opts.map(o => {
          const total = PCG.api.computeOptionTotal(rev.id, o.id);
          const netStr = total ? PCG.money(total.net) : '—';
          const delta = o.priceDelta === 0 ? 'Included'
                      : o.priceOverride != null ? 'Override '+PCG.money(o.priceOverride)
                      : o.priceDelta > 0 ? '+'+PCG.money(o.priceDelta)
                      : PCG.money(o.priceDelta);
          return `<div style="min-width:180px; padding:10px 14px; background: ${o.recommended?'rgba(1,153,253,0.08)':'var(--surface-1)'}; border:1px solid ${o.recommended?'var(--pcg-bright-blue)':'var(--border)'}; border-radius:var(--r-md); position:relative;">
            ${o.recommended ? '<span style="position:absolute; top:-8px; right:8px; background:var(--pcg-bright-blue); color:white; padding:1px 8px; border-radius:10px; font-size:9px; font-family:var(--font-display); letter-spacing:0.1em;">RECOMMENDED</span>':''}
            ${o.clientSelected ? '<span style="position:absolute; top:-8px; left:8px; background:var(--status-green); color:white; padding:1px 8px; border-radius:10px; font-size:9px; font-family:var(--font-display); letter-spacing:0.1em;">CLIENT PICK</span>':''}
            <div style="font-family:var(--font-display); font-size:13px; font-weight:600;">${PCG.escapeHtml(o.label)}</div>
            <div class="muted" style="font-size:10px; margin-top:2px;">${PCG.escapeHtml(o.description||'').slice(0,60)}${(o.description||'').length>60?'…':''}</div>
            <div class="mono" style="margin-top:6px; font-size:13px; color:var(--pcg-bright-blue); font-weight:600;">${netStr}</div>
            <div class="muted" style="font-size:10px;">${delta}</div>
            ${editableByMe ? `<div style="margin-top:6px; display:flex; gap:4px;">
              <button class="btn sm ghost" onclick="editOption('${o.id}')" style="font-size:10px; padding:2px 6px;">Edit</button>
              ${!o.recommended ? `<button class="btn sm ghost" onclick="setRecommended('${o.id}')" style="font-size:10px; padding:2px 6px;">★</button>` : ''}
              <button class="btn sm ghost" onclick="removeOption('${o.id}')" style="font-size:10px; padding:2px 6px;">✕</button>
            </div>`:''}
          </div>`;
        }).join('')}
      </div>` : `<div class="muted" style="font-size:var(--fs-sm); flex:1;">No options yet. Add 2–3 scenarios (e.g. "Good / Better / Best") and let the client pick.</div>`;

    bar.innerHTML = `
      <div class="card" style="padding:var(--sp-3); display:flex; align-items:center; gap:var(--sp-3); flex-wrap:wrap;">
        <div style="font-family:var(--font-display); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-secondary);">Scenario Options</div>
        ${revPicker}
        ${optionsHtml}
        ${editableByMe ? `<div style="display:flex; gap:var(--sp-2); margin-left:auto;">
          <button class="btn sm" onclick="addOption()">＋ Option</button>
          <button class="btn sm ghost" onclick="newRevision()">＋ New Revision</button>
        </div>`:''}
      </div>`;
  }

  // Option handlers
  window.addOption = () => {
    const label = prompt('Option label (e.g. "Good", "Better", "Best" or "Standard", "Premium"):');
    if(!label) return;
    const description = prompt('Short description shown to client (optional):', '');
    const deltaStr = prompt('Price adjustment vs base revision (e.g. 0 for included, 8500 for +$8,500, -3000 for discount):', '0');
    const priceDelta = parseFloat(deltaStr) || 0;
    try {
      PCG.api.addQuoteOption(rev.id, { label, description, priceDelta, inclusions:[], recommended: (rev.options||[]).length === 0 });
      renderOptionsBar();
    } catch(e){ alert(e.message); }
  };
  window.editOption = (id) => {
    const o = (rev.options||[]).find(x => x.id === id);
    if(!o) return;
    const label = prompt('Option label:', o.label);
    if(label === null) return;
    const description = prompt('Description:', o.description||'');
    if(description === null) return;
    const deltaStr = prompt('Price delta vs base ($). Leave "override" blank.', o.priceOverride != null ? '' : String(o.priceDelta||0));
    const overrideStr = prompt('OR price override (absolute $) — leave blank to use delta:', o.priceOverride != null ? String(o.priceOverride) : '');
    try {
      const patch = { label, description };
      if(overrideStr && overrideStr.trim() !== ''){
        patch.priceOverride = parseFloat(overrideStr);
        patch.priceDelta = 0;
      } else {
        patch.priceOverride = null;
        patch.priceDelta = parseFloat(deltaStr)||0;
      }
      PCG.api.updateQuoteOption(rev.id, id, patch);
      renderOptionsBar();
    } catch(e){ alert(e.message); }
  };
  window.setRecommended = (id) => {
    try {
      PCG.api.updateQuoteOption(rev.id, id, { recommended: true });
      renderOptionsBar();
    } catch(e){ alert(e.message); }
  };
  window.removeOption = (id) => {
    if(!confirm('Remove this option?')) return;
    try {
      PCG.api.removeQuoteOption(rev.id, id);
      renderOptionsBar();
    } catch(e){ alert(e.message); }
  };

  window.newRevision = () => {
    if(!confirm(`Create a new revision cloned from v${rev.revisionNumber}?\n\nThe new revision becomes active (Draft). Prior revisions stay read-only in history.\n\nUse this for scope changes after Awarded, or for side-by-side alternatives.`)) return;
    try {
      const res = PCG.api.createQuoteRevision(quote.id, { fromRevId: rev.id, makeActive: true });
      if(!res.ok){ alert('Failed: '+res.reason); return; }
      alert(`✓ Revision v${res.revision.revisionNumber} created. Reloading…`);
      location.href = 'quote.html?id=' + quote.id;
    } catch(e){ alert(e.message); }
  };

  window.switchRevision = (revId) => {
    location.href = 'quote.html?id=' + quote.id + '&rev=' + revId;
  };

  // -------- View switcher --------
  const render = (view)=>{
    document.getElementById('view-body').innerHTML = V[view]();
    if(view==='working') renderWorking();
    if(view==='profit')  renderProfit();
    if(view==='change')  renderChange();
    if(view==='warehouse') renderWarehouse();
    if(view==='labor')   renderLabor();
    renderTotals();
    renderOptionsBar();
  };
  render('working');

  document.querySelectorAll('.qb-views button').forEach(b => b.addEventListener('click', e=>{
    document.querySelectorAll('.qb-views button').forEach(x=>x.classList.toggle('on', x===e.target));
    render(e.target.dataset.v);
  }));

  // Wire buttons
  document.getElementById('btn-recheck').addEventListener('click', ()=>{
    runAvailChecks();
    PCG.engines.notify.emit('AvailabilityRecheck', { quoteId: quote.id, lines: (rev.lines||[]).length });
  });

  // --------------------------------------------------------------------
  // Real Add-Line picker (Items / System Builder / Labor) — replaces
  // prior Phase-2 notImpl stubs. Implements spec §5.3 + §L (v2.2).
  // --------------------------------------------------------------------
  let pkTab = 'items';
  let pkQuery = '';
  let pkCategory = '';

  const modal = {
    open: () => { document.getElementById('pk-bd').classList.add('show'); document.getElementById('pk-box').classList.add('show'); renderPicker(); },
    close: () => { document.getElementById('pk-bd').classList.remove('show'); document.getElementById('pk-box').classList.remove('show'); }
  };
  window.closePicker = modal.close;

  document.getElementById('btn-new-line').addEventListener('click', () => {
    if(!editableByMe){ alert('This revision is read-only.'); return; }
    pkTab = 'items'; pkQuery = ''; pkCategory = '';
    document.querySelectorAll('#pk-tabs button').forEach(b=>b.classList.toggle('on', b.dataset.pt==='items'));
    modal.open();
  });
  document.querySelectorAll('#pk-tabs button').forEach(b => b.addEventListener('click', e => {
    document.querySelectorAll('#pk-tabs button').forEach(x=>x.classList.toggle('on', x===e.target));
    pkTab = e.target.dataset.pt;
    renderPicker();
  }));

  function renderPicker(){
    const body = document.getElementById('pk-body');
    if(pkTab === 'items')       return renderItemsTab(body);
    if(pkTab === 'systems')     return renderSystemsTab(body);
    if(pkTab === 'labor')       return renderLaborTab(body);
    if(pkTab === 'travel')      return renderTravelTab(body);
    if(pkTab === 'transport')   return renderTransportTab(body);
    if(pkTab === 'subrental')   return renderSubRentalTab(body);
    if(pkTab === 'purchase')    return renderPurchaseTab(body);
    if(pkTab === 'service')     return renderServiceTab(body);
    if(pkTab === 'heavy')       return renderHeavyTab(body);
    if(pkTab === 'fee')         return renderFeeTab(body);
    if(pkTab === 'discount')    return renderDiscountTab(body);
    if(pkTab === 'bundle')      return renderBundleTab(body);
    if(pkTab === 'consumable')  return renderConsumableTab(body);
    if(pkTab === 'misc')        return renderMiscTab(body);
  }

  // ============= QUICK-FORM helpers — used for all non-tree tabs =============
  function quickForm(body, title, helpText, fields, onSubmit) {
    body.innerHTML = `
      <div class="muted" style="font-size:var(--fs-xs); margin-bottom:var(--sp-3);">${helpText}</div>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:var(--sp-2);">
        ${fields.map(f => `
          <div ${f.full?'style="grid-column: 1 / -1;"':''}>
            <label style="display:block; font-size:var(--fs-xs); color:var(--text-tertiary); margin-bottom:3px;">${PCG.escapeHtml(f.label)}</label>
            ${f.type === 'select' ? `
              <select id="qf-${f.id}" style="width:100%; background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:6px 8px; border-radius:var(--r-sm); font-size:var(--fs-sm);">
                ${f.options.map(o => `<option value="${PCG.escapeHtml(o.value)}" ${o.selected?'selected':''}>${PCG.escapeHtml(o.label)}</option>`).join('')}
              </select>
            ` : f.type === 'textarea' ? `
              <textarea id="qf-${f.id}" placeholder="${PCG.escapeHtml(f.placeholder||'')}" style="width:100%; background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:6px 8px; border-radius:var(--r-sm); font-size:var(--fs-sm); font-family:inherit; min-height:60px; resize:vertical;">${PCG.escapeHtml(f.default||'')}</textarea>
            ` : `
              <input type="${f.type||'text'}" id="qf-${f.id}" placeholder="${PCG.escapeHtml(f.placeholder||'')}" value="${PCG.escapeHtml(f.default!=null?String(f.default):'')}"
                     ${f.type==='number'?'step="any"':''}
                     style="width:100%; background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:6px 8px; border-radius:var(--r-sm); font-size:var(--fs-sm);" />
            `}
          </div>`).join('')}
      </div>
      <div style="display:flex; gap:8px; margin-top:var(--sp-4); justify-content:flex-end;">
        <button class="btn ghost" onclick="closePicker()">Cancel</button>
        <button class="btn primary" id="qf-save">Add ${PCG.escapeHtml(title)} Line →</button>
      </div>`;
    document.getElementById('qf-save').addEventListener('click', () => {
      const values = {};
      fields.forEach(f => {
        const el = document.getElementById('qf-'+f.id);
        values[f.id] = f.type==='number' ? parseFloat(el.value) || 0 : el.value;
      });
      onSubmit(values);
    });
  }

  function addTyped(line, afterAction) {
    const res = PCG.api.addQuoteLine(rev.id, line);
    if(!res.ok){ alert('Blocked: '+res.reason); return; }
    modal.close();
    render('working');
    document.querySelectorAll('.qb-views button').forEach(b=>b.classList.toggle('on', b.dataset.v==='working'));
    if(afterAction) afterAction();
  }

  function renderTravelTab(body){
    quickForm(body, 'Travel', 'Travel line — Airfare, Hotel, Per Diem, Car, Parking, Catering, Baggage. Multiply qty × days × unit (rate tier Day) or qty × unit (Each).', [
      { id:'travelType', label:'Travel Type', type:'select', options:[
        { value:'Airfare',  label:'Airfare (Each)' },
        { value:'Hotel',    label:'Hotel (per Day)' },
        { value:'PerDiem',  label:'Per Diem (per Day)' },
        { value:'CarRental',label:'Car Rental (per Day)' },
        { value:'Parking',  label:'Parking (per Day)' },
        { value:'Catering', label:'Catering (Each)' },
        { value:'Baggage',  label:'Baggage (Each)' }
      ]},
      { id:'desc', label:'Description', type:'text', placeholder:'e.g. Hotel — Caesar\'s Palace (13 crew)', full:true },
      { id:'qty',  label:'Qty (travelers)', type:'number', default:13 },
      { id:'days', label:'Days', type:'number', default:7 },
      { id:'rate', label:'Unit Price', type:'number', default:220 },
      { id:'billing', label:'Billing', type:'select', options:[
        { value:'PassThrough', label:'Pass-through (no markup)' },
        { value:'MarkupPct',   label:'Markup %' },
        { value:'FlatAllowance',label:'Flat allowance' },
        { value:'ClientPays',  label:'Client pays direct' }
      ]}
    ], (v) => {
      const isEach = v.travelType === 'Airfare' || v.travelType === 'Catering' || v.travelType === 'Baggage';
      addTyped({
        packageName:'Travel · '+v.travelType, type:'Travel',
        travelType: v.travelType,
        description: v.desc || v.travelType,
        qty: v.qty || 1,
        rateTier: isEach ? 'Each' : 'day',
        days: isEach ? 0 : (v.days || 1),

  // ==============================================================
  // GUIDED SYSTEM INSERT · AE quote-time flow
  // Uses director-authored SYSTEM_DEFS (from assets/system-defs.js).
  // Stepper → rules fire live → downstream output summary → Insert.
  // In Reconfigure mode · prefill answers from a stored instance +
  // show a delta panel comparing before-vs-after rule emits.
  // ==============================================================
  const INST_KEY = `pcg_quote_systems_${qid}`;
  const loadInstances = () => { try { return JSON.parse(sessionStorage.getItem(INST_KEY) || '[]') || []; } catch { return []; } };
  const saveInstances = (arr) => sessionStorage.setItem(INST_KEY, JSON.stringify(arr || []));

  const gsiState = { sysId: null, answers: {}, mode: 'insert', instanceId: null, priorAnswers: null };

  window.openGsi = (sysId, instanceId) => {
    const sys = PCG.getSystemDef(sysId); if(!sys) return;
    gsiState.sysId = sysId;
    if(instanceId){
      // Reconfigure mode · prefill from stored instance
      const insts = loadInstances();
      const inst = insts.find(i => i.id === instanceId);
      if(inst){
        gsiState.mode = 'reconfigure';
        gsiState.instanceId = instanceId;
        gsiState.priorAnswers = Object.assign({}, inst.answers);
        gsiState.answers = Object.assign({}, inst.answers);
      } else {
        gsiState.mode = 'insert';
        gsiState.instanceId = null;
        gsiState.priorAnswers = null;
        gsiState.answers = PCG.defaultAnswers(sys);
      }
    } else {
      gsiState.mode = 'insert';
      gsiState.instanceId = null;
      gsiState.priorAnswers = null;
      gsiState.answers = PCG.defaultAnswers(sys);
    }
    modal.close(); // close the outer picker if open
    document.getElementById('gsi-bd').classList.add('show');
    document.getElementById('gsi-box').classList.add('show');
    renderGsi();
  };
