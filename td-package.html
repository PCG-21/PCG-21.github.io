<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PCG Stage · TD Show Package</title>
<link rel="stylesheet" href="assets/tokens.css" />
<link rel="stylesheet" href="assets/app.css" />
<style>
  /* TD Show Package — the internal execution packet.
     Not the client advance (that's external); not the cue grid.
     This is the TD / crew's run-of-show digest, generated from the
     Show Command Center and printable as a field handout. */

  .td-toolbar {
    display: flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-3);
  }
  .td-toolbar .right { margin-left:auto; display:flex; gap: var(--sp-2); }

  .td-shell {
    max-width: 1000px; margin: 0 auto;
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: var(--r-md); overflow: hidden;
  }
  .td-hero {
    padding: 30px 36px;
    background: linear-gradient(135deg, rgba(1,153,253,0.10), rgba(149,100,216,0.10)), var(--surface-1);
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .td-hero::before {
    content:""; position:absolute; top:0; left:0; right:0; height:4px;
    background: linear-gradient(90deg, var(--pcg-confident-blue), var(--pcg-bright-blue), var(--pcg-spotlight-purple));
  }
  .td-hero .eyebrow {
    font-family: var(--font-display); font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--pcg-bright-blue);
  }
  .td-hero h1 {
    font-family: var(--font-display); font-size: 32px; margin: 6px 0 4px; letter-spacing: 0.01em;
  }
  .td-hero .sub { color: var(--text-secondary); font-size: var(--fs-md); }
  .td-banner {
    display:inline-flex; align-items:center; gap: 8px;
    margin-top: 14px;
    padding: 6px 12px; border-radius: var(--r-pill);
    background: rgba(1,153,253,0.14); color: var(--pcg-bright-blue);
    border: 1px solid rgba(1,153,253,0.35);
    font-family: var(--font-display); font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; font-weight: 700;
  }
  .td-hero .dates { margin-top: 18px; display: flex; gap: 24px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 13px; }
  .td-hero .dates div span { display:block; font-size: 10px; color: var(--text-tertiary); font-family: var(--font-display); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }

  .td-toc {
    padding: 14px 36px; background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 14px; flex-wrap: wrap;
    font-size: 11.5px; font-family: var(--font-mono);
  }
  .td-toc a { color: var(--text-secondary); text-decoration: none; border-bottom: 1px dashed transparent; }
  .td-toc a:hover { color: var(--pcg-bright-blue); border-color: var(--pcg-bright-blue); }

  .td-body { padding: 28px 36px; }
  .td-section { margin-bottom: 36px; scroll-margin-top: calc(var(--topbar-h) + 24px); }
  .td-section h2 {
    font-family: var(--font-display); font-size: 13px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--pcg-bright-blue);
    border-bottom: 1px solid var(--border-accent);
    padding-bottom: 8px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .td-section h2 .repo { margin-left: auto; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0; text-transform: none; color: var(--text-tertiary); font-weight: 400; }

  .td-grid { display: grid; grid-template-columns: 160px 1fr; gap: 12px 24px; font-size: var(--fs-sm); }
  .td-grid .k { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.08em; font-size: 10.5px; color: var(--text-tertiary); padding-top: 3px; }
  .td-grid .v { color: var(--text-primary); line-height: 1.6; }

  .td-contacts { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
  .td-contact {
    border: 1px solid var(--border); border-radius: var(--r-sm); padding: 14px;
    background: var(--surface-0);
  }
  .td-contact .role { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-display); letter-spacing: 0.08em; text-transform: uppercase; }
  .td-contact .who  { font-weight: 600; font-size: var(--fs-md); margin-top: 2px; }
  .td-contact .meta { font-size: 11.5px; color: var(--text-secondary); margin-top: 6px; font-family: var(--font-mono); line-height: 1.7; }

  .td-leads { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
  .td-lead {
    padding: 14px;
    border: 1px solid var(--border); border-radius: var(--r-sm);
    background: var(--surface-0);
    display: grid; grid-template-columns: 32px 1fr; gap: 10px; align-items: start;
  }
  .td-lead .ico { font-size: 22px; line-height: 1; }
  .td-lead .dept { font-family: var(--font-display); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }
  .td-lead .nm   { font-weight: 600; font-size: var(--fs-sm); margin-top: 2px; }
  .td-lead .cn   { font-size: 11px; font-family: var(--font-mono); color: var(--text-secondary); margin-top: 4px; line-height: 1.7; }

  .td-sched { border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; }
  .td-sched table { width:100%; border-collapse: collapse; }
  .td-sched th, .td-sched td { padding: 10px 14px; font-size: var(--fs-sm); border-bottom: 1px solid var(--border); text-align: left; }
  .td-sched th { background: var(--surface-2); font-size: 10.5px; font-family: var(--font-display); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }
  .td-sched td:first-child { font-family: var(--font-mono); white-space: nowrap; color: var(--text-secondary); }
  .td-sched tr:last-child td { border-bottom: 0; }

  .td-ros { border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; }
  .td-ros table { width: 100%; border-collapse: collapse; }
  .td-ros th, .td-ros td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
  .td-ros th { background: var(--surface-2); font-family: var(--font-display); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }
  .td-ros td:first-child { font-family: var(--font-mono); white-space: nowrap; color: var(--pcg-bright-blue); }
  .td-ros tr:last-child td { border-bottom: 0; }

  .td-scope { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; }
  .td-scope-col { border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--surface-0); padding: 12px 14px; }
  .td-scope-col h4 { margin: 0 0 8px; font-size: var(--fs-sm); font-family: var(--font-display); letter-spacing: 0.04em; }
  .td-scope-col ul { margin: 0; padding: 0; list-style: none; font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
  .td-scope-col li { padding: 3px 0; border-bottom: 1px dashed var(--border); }
  .td-scope-col li:last-child { border-bottom: 0; }

  .td-watch {
    padding: 14px 18px; border-radius: var(--r-sm);
    border: 1px solid rgba(245,176,65,0.35);
    background: linear-gradient(135deg, rgba(245,176,65,0.08), transparent 70%);
    border-left: 3px solid var(--status-amber);
  }
  .td-watch ul { margin: 0; padding-left: 20px; font-size: var(--fs-sm); line-height: 1.7; color: var(--text-primary); }
  .td-watch ul li { padding: 2px 0; }

  .td-notes { display: grid; gap: 8px; }
  .td-note {
    padding: 10px 14px; border-radius: var(--r-sm);
    border: 1px solid var(--border); background: var(--surface-0);
    border-left: 2px solid var(--pcg-bright-blue);
  }
  .td-note .t { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); margin-bottom: 2px; }
  .td-note .b { font-size: 12.5px; color: var(--text-primary); line-height: 1.5; }

  .td-refs { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
  .td-ref {
    padding: 14px 16px; border-radius: var(--r-sm);
    border: 1px solid var(--border); background: var(--surface-0);
    display: grid; grid-template-columns: 32px 1fr; gap: 12px;
    color: var(--text-primary); text-decoration: none;
    transition: border-color var(--t-fast);
  }
  .td-ref:hover { border-color: var(--pcg-bright-blue); }
  .td-ref .ico { font-size: 22px; line-height: 1; }
  .td-ref .tt  { font-weight: 600; font-size: var(--fs-sm); }
  .td-ref .nt  { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; font-family: var(--font-mono); }

  .td-footer {
    padding: 18px 36px; background: var(--surface-2); border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-tertiary); display: flex; justify-content: space-between; gap: 18px; flex-wrap: wrap;
  }

  @media print {
    .no-print, nav, #app-shell, .td-toolbar { display: none !important; }
    body { background: #fff !important; color: #000 !important; }
    .td-shell { border: 0; max-width: 100%; }
    .td-hero, .td-body, .td-footer, .td-toc { background: #fff !important; color: #000 !important; }
    .td-hero h1, .td-section h2, .td-lead .nm, .td-contact .who { color: #000 !important; }
    .td-hero .eyebrow, .td-section h2 { color: #0066aa !important; }
  }
</style>
</head>
<body>
<div class="app">
  <div id="app-shell"></div>
  <main class="main">
    <div class="container">

      <div class="td-toolbar no-print">
        <a class="btn sm ghost" id="back-link" href="#">← Back to Show Command Center</a>
        <span class="muted" style="font-size: var(--fs-xs);">TD / Crew execution packet · distinct from the client Advance</span>
        <div class="right">
          <a class="btn sm ghost" id="open-ps" href="#">→ Production Schedule</a>
          <a class="btn sm ghost" id="open-sf" href="#">→ Show Flow</a>
          <button class="btn sm ghost" onclick="window.print()">⎙ Print / PDF</button>
          <button class="btn sm" id="dist">📧 Distribute to crew</button>
        </div>
      </div>

      <div class="td-shell" id="td"></div>

    </div>
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/permissions.js"></script>
<script src="assets/engines.js"></script>
<script src="assets/api.js"></script>
<script src="assets/seed.js"></script>
<script src="assets/app.js"></script>
<script>
  PCG.mountShell({active:'td-package', pageTitle:'TD Show Package'});

  const code = PCG.qs('project', 'LCE-2026');
  const drafts = JSON.parse(sessionStorage.getItem('pcg_demo_shows') || '[]');
  const draft  = drafts.find(d => d.code === code);
  const proj   = draft || PCG.api.getProject(code);
  if(!proj){
    document.getElementById('td').innerHTML = '<div class="card-body empty" style="padding: 40px;">Show not found.</div>';
    throw new Error('no project');
  }

  document.getElementById('back-link').href = `show-center.html?project=${encodeURIComponent(code)}`;
  document.getElementById('open-ps').href   = `production-schedule.html?project=${encodeURIComponent(code)}`;
  document.getElementById('open-sf').href   = `show-flow.html?project=${encodeURIComponent(code)}`;

  // Populate Latest Changes (24h rolling feel).
  // Pulls: Decision marks from chat, field-captured items, venue-req
  // state changes (seed), truck status changes (seed), creative approval
  // moves (seed). Mixed with hand-authored demo changes so the section
  // reads true even on first load.
  setTimeout(() => {
    const seed = [
      { icon:'🚚', tone:'amber',  body:'<strong>Truck 1 arrival moved</strong> from 06:00 → <strong>06:30 AM</strong> · dock 2. Production Schedule + Advance updated.' },
      { icon:'✓',  tone:'green',  body:'<strong>Ballroom cleared</strong> status flipped to <em>Confirmed</em> by venue ops · visible in Client Portal.' },
      { icon:'🎨', tone:'blue',   body:'<strong>Awards package</strong> creative approval received from client · stage 4/4 · Creative Pipeline updated.' },
      { icon:'⚠',  tone:'red',    body:'<strong>Field note flagged:</strong> "Dock congestion after 3 PM — hotel catering shift has moved earlier." · posted to Risk Register.' },
      { icon:'⚡', tone:'purple', body:'<strong>CO #3 · Ready-room</strong> decision approved · scope tags cleared · T4 truck released from hold.' },
      { icon:'🗺', tone:'blue',   body:'Site visit added <strong>3 venue-condition photos</strong> (hallway corner protection · BOH storage) · saved to Caesars Forum venue record.' }
    ];

    // Pull field-capture issues into the change list
    const fieldRaw = JSON.parse(sessionStorage.getItem(`pcg_field_${proj.code}`) || '[]');
    const recentField = fieldRaw.slice(0, 2).map(f => ({
      icon: f.kind === 'issue' ? '⚠' : (f.kind === 'venue' ? '🏛' : '📝'),
      tone: f.kind === 'issue' ? 'red' : 'blue',
      body: `<strong>Field capture · ${PCG.escapeHtml(f.kind)}:</strong> ${PCG.escapeHtml(String(f.body || '').slice(0, 110))}${f.body && f.body.length > 110 ? '…' : ''}`
    }));

    const rows = recentField.concat(seed).slice(0, 8);
    const wrap = document.getElementById('td-change-list');
    if(wrap){
      const toneColor = { amber:'var(--status-amber)', green:'var(--status-green)', blue:'var(--pcg-bright-blue)', red:'var(--status-red)', purple:'var(--pcg-spotlight-purple)' };
      wrap.innerHTML = rows.map(r => `
        <div style="display:grid; grid-template-columns: 28px 1fr; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5;">
          <span style="font-size: 15px; color: ${toneColor[r.tone] || 'var(--pcg-bright-blue)'};">${r.icon}</span>
          <span style="color: var(--text-primary);">${r.body}</span>
        </div>`).join('');
    }
  }, 0);

  document.getElementById('dist').addEventListener('click', () => {
    alert('✓ TD package staged for distribution.\n\nRecipients:\n• Technical Director · Chris Taylor\n• Audio lead · Priya Shah (A1)\n• Video lead · V1 operator\n• Lighting lead · LD\n• Scenic lead\n• Rigging · IATSE 720 steward\n• Show Caller · J. Gerber\n\nA PDF copy also archives to the Show Book.');
  });

  // ---------- Lookups ----------
  const pm = PCG.findPerson(proj.primaryPM);
  const td = PCG.findPerson(proj.td);
  const creative = PCG.findPerson(proj.creativeLead);
  const showCaller = PCG.findPerson(proj.showCaller);
  function fmtD(iso){ if(!iso) return '—'; const d = new Date(iso); return `${d.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric'})} · ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`; }

  // Field-captured issues/learnings for latest-notes block
  const rawField = JSON.parse(sessionStorage.getItem(`pcg_field_${proj.code}`) || '[]');
  const fieldNotes = rawField.filter(r => ['issue','learning','note','diary'].includes(r.kind)).slice(0, 5);
  const diary = JSON.parse(sessionStorage.getItem(`pcg_diary_${proj.code}`) || 'null') || [];

  // ---------- Render ----------
  document.getElementById('td').innerHTML = `
    <div class="td-hero">
      <div class="eyebrow">TD Show Package · ${PCG.escapeHtml(proj.code)}</div>
      <h1>${PCG.escapeHtml(proj.name)}</h1>
      <div class="sub">${PCG.escapeHtml(proj.venueName || '—')} · ${PCG.escapeHtml(proj.oneLiner || '')}</div>
      <div class="td-banner">⚡ Generated from STAGE · Internal TD / Crew packet</div>
      <div class="dates">
        <div><span>Prep</span>${PCG.fmtShort(proj.dates?.prep)}</div>
        <div><span>Load-In</span>${fmtD(proj.dates?.loadIn)}</div>
        <div><span>Show</span>${PCG.fmtShort(proj.dates?.showStart)} → ${PCG.fmtShort(proj.dates?.showEnd)}</div>
        <div><span>Strike</span>${fmtD(proj.dates?.loadOut)}</div>
        <div><span>Return</span>${PCG.fmtShort(proj.dates?.ret)}</div>
      </div>
    </div>

    <div class="td-toc">
      <span style="color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px;">Sections:</span>
      <a href="#td-over">Overview</a>
      <a href="#td-con">Contacts</a>
      <a href="#td-lead">Department leads</a>
      <a href="#td-changes">Latest changes</a>
      <a href="#td-trucks">Logistics &amp; trucking</a>
      <a href="#td-sched">Schedule summary</a>
      <a href="#td-ros">ROS summary</a>
      <a href="#td-scope">Scope</a>
      <a href="#td-watch">Venue watch-outs</a>
      <a href="#td-notes">Field notes</a>
      <a href="#td-refs">References</a>
    </div>

    <div class="td-body">

      <!-- OVERVIEW -->
      <div class="td-section" id="td-over">
        <h2>Overview <span class="repo">Pulled from Show Command Center · live</span></h2>
        <div class="td-grid">
          <div class="k">Client</div>        <div class="v">${PCG.escapeHtml(proj.client || '—')}</div>
          <div class="k">Venue</div>         <div class="v">${PCG.escapeHtml(proj.venueName || '—')}</div>
          <div class="k">Show type</div>     <div class="v">${PCG.escapeHtml(proj.showType || 'general-session')}</div>
          <div class="k">Project code</div>  <div class="v mono">${PCG.escapeHtml(proj.code)}</div>
          <div class="k">Lifecycle</div>     <div class="v">${PCG.escapeHtml((proj.show && proj.show.lifecycleState) || proj.status || 'Planning')}</div>
          ${proj.quoteNo ? `<div class="k">Source quote</div><div class="v mono">${PCG.escapeHtml(proj.quoteNo)}</div>` : ''}
          <div class="k">One-liner</div>     <div class="v">${PCG.escapeHtml(proj.oneLiner || '—')}</div>
        </div>
      </div>

      <!-- CONTACTS -->
      <div class="td-section" id="td-con">
        <h2>Contacts <span class="repo">PM · TD · Creative · Show Caller · venue ops · 24/7 hotline</span></h2>
        <div class="td-contacts">
          ${pm ? `<div class="td-contact">
            <div class="role">Project Manager</div>
            <div class="who">${PCG.escapeHtml(pm.name)}</div>
            <div class="meta">📧 ${(pm.email||'').toLowerCase() || 'email@pcg.co'}<br>📱 ${pm.phone || '(555) 000-0000'}</div>
          </div>` : ''}
          ${td ? `<div class="td-contact">
            <div class="role">Technical Director</div>
            <div class="who">${PCG.escapeHtml(td.name)}</div>
            <div class="meta">📧 ${(td.email||'').toLowerCase() || 'email@pcg.co'}<br>📱 ${td.phone || '(555) 000-0000'}</div>
          </div>` : ''}
          ${showCaller ? `<div class="td-contact">
            <div class="role">Show Caller</div>
            <div class="who">${PCG.escapeHtml(showCaller.name)}</div>
            <div class="meta">📧 ${(showCaller.email||'').toLowerCase() || 'email@pcg.co'}<br>📱 ${showCaller.phone || '(555) 000-0000'}</div>
          </div>` : ''}
          ${creative ? `<div class="td-contact">
            <div class="role">Creative Lead</div>
            <div class="who">${PCG.escapeHtml(creative.name)}</div>
            <div class="meta">📧 ${(creative.email||'').toLowerCase() || 'email@pcg.co'}<br>📱 ${creative.phone || '(555) 000-0000'}</div>
          </div>` : ''}
          <div class="td-contact">
            <div class="role">Venue Ops</div>
            <div class="who">Caesars Forum · Ops Desk</div>
            <div class="meta">📧 ops@caesarsforum.com<br>📱 (702) 555-0140</div>
          </div>
          <div class="td-contact">
            <div class="role">PCG 24/7 Ops</div>
            <div class="who">PCG Production Hotline</div>
            <div class="meta">📧 ops@pcgstage.com<br>📱 (248) 555-0199</div>
          </div>
        </div>
      </div>

      <!-- DEPARTMENT LEADS -->
      <div class="td-section" id="td-lead">
        <h2>Department leads <span class="repo">Crew-facing ownership · IATSE + PCG</span></h2>
        <div class="td-leads">
          <div class="td-lead"><span class="ico">🎚</span><div><div class="dept">Audio · A1</div><div class="nm">Priya Shah</div><div class="cn">FOH · CL5<br>📱 (248) 555-0151</div></div></div>
          <div class="td-lead"><span class="ico">🎥</span><div><div class="dept">Video · V1</div><div class="nm">Tom Rivera</div><div class="cn">Barco E2 · IMAG<br>📱 (248) 555-0152</div></div></div>
          <div class="td-lead"><span class="ico">💡</span><div><div class="dept">Lighting · LD</div><div class="nm">Morgan Hale</div><div class="cn">ETC Ion XE · FOH<br>📱 (248) 555-0153</div></div></div>
          <div class="td-lead"><span class="ico">⛓</span><div><div class="dept">Rigging</div><div class="nm">IATSE 720 Steward</div><div class="cn">Dead-hangs · motor certs<br>📱 (702) 555-0175</div></div></div>
          <div class="td-lead"><span class="ico">⚡</span><div><div class="dept">Power</div><div class="nm">Scott Vance</div><div class="cn">Tie-in + distro<br>📱 (248) 555-0155</div></div></div>
          <div class="td-lead"><span class="ico">🧱</span><div><div class="dept">Scenic · Stage</div><div class="nm">Lena Wu</div><div class="cn">Marquee set · thrust<br>📱 (248) 555-0156</div></div></div>
          <div class="td-lead"><span class="ico">🎨</span><div><div class="dept">Creative · QLab</div><div class="nm">${creative ? PCG.escapeHtml(creative.name) : 'K. Oliver'}</div><div class="cn">Playback · graphics<br>📱 (248) 555-0157</div></div></div>
          <div class="td-lead"><span class="ico">🚚</span><div><div class="dept">Logistics</div><div class="nm">M. Duda</div><div class="cn">Trucks · dock ops<br>📱 (248) 555-0158</div></div></div>
        </div>
      </div>

      <!-- LATEST CHANGES SINCE YESTERDAY -->
      <div class="td-section" id="td-changes">
        <h2>Latest changes · since yesterday <span class="repo">Live delta · auto-rolls every 24h</span></h2>
        <div style="border: 1px solid rgba(245,176,65,0.35); border-left: 3px solid var(--status-amber); background: linear-gradient(135deg, rgba(245,176,65,0.05), transparent 70%); border-radius: var(--r-sm); padding: 14px 18px;">
