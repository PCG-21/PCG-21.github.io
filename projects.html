<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PCG Stage · Projects</title>
<link rel="stylesheet" href="assets/tokens.css" />
<link rel="stylesheet" href="assets/app.css" />
<style>
  .proj-card {
    background: var(--surface-1); border:1px solid var(--border);
    border-radius: var(--r-md); padding: var(--sp-4);
    display: grid; grid-template-columns: 60px 1fr auto; gap: var(--sp-3);
    align-items: start; cursor:pointer; transition: border-color var(--t-fast);
  }
  .proj-card:hover { border-color: var(--border-accent); }
  .proj-card .code {
    width:60px; height:60px; border-radius: 12px;
    background: var(--grad-show-light-spectrum);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700; font-size: 12px;
    color: white; text-align: center; line-height: 1.1; letter-spacing: 0.02em;
    padding: 4px;
  }
  .proj-card.state-InPrep .code  { background: linear-gradient(135deg,#F5B73C,#0199FD); }
  .proj-card.state-OnShow .code  { background: linear-gradient(135deg,#7A41E5,#D92FB4); }
  .proj-card.state-Quoted .code  { background: linear-gradient(135deg,#0199FD,#013558); }
  .proj-card.state-Archived .code{ background: linear-gradient(135deg,#5C6777,#28303C); opacity: 0.7; }
  .proj-card .comps { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
  .view-seg { display:inline-flex; background: var(--surface-2); border-radius: var(--r-pill); padding: 2px; }
  .view-seg button {
    padding: 4px 12px; border:0; background: transparent; color: var(--text-secondary);
    font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.08em;
    font-size: 10px; cursor: pointer; border-radius: var(--r-pill);
  }
  .view-seg button.on { background: var(--pcg-bright-blue); color: #001a2a; }
</style>
</head>
<body>
<div class="app">
  <div id="app-shell"></div>
  <main class="main">
    <div class="container">

      <div style="display:flex; align-items:flex-end; gap:var(--sp-3); margin-bottom:var(--sp-4);">
        <div>
          <div class="eyebrow">Projects</div>
          <h1>ALL PROJECTS</h1>
          <div class="muted">Every commercial engagement, current and historical. Sorted and filtered.</div>
        </div>
        <div style="margin-left:auto; display:flex; gap:var(--sp-2); align-items:center; flex-wrap:wrap;">
          <div class="view-seg" id="viewSeg">
            <button class="on" data-v="grid">Grid</button>
            <button data-v="table">Table</button>
          </div>
          <input id="q" placeholder="Search code, name, client, venue…" style="background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:6px 12px; border-radius:var(--r-pill); width:260px; font-size:var(--fs-sm);" />
          <a class="btn sm primary" href="pif.html">＋ New Project (PIF)</a>
        </div>
      </div>

      <div class="kpi-strip" id="kpis"></div>

      <div style="display:flex; gap: var(--sp-2); margin-bottom: var(--sp-4); flex-wrap:wrap;">
        <span class="eyebrow" style="font-size:10px; align-self:center;">STATE</span>
        <button class="chip on" data-s="all">All</button>
        <button class="chip" data-s="Opportunity">Opportunity</button>
        <button class="chip" data-s="Quoted">Quoted</button>
        <button class="chip" data-s="Awarded">Awarded</button>
        <button class="chip" data-s="InPrep">In Prep</button>
        <button class="chip" data-s="OnShow">On Show</button>
        <button class="chip" data-s="Closing">Closing</button>
        <button class="chip" data-s="Archived">Archived</button>
        <div style="width:20px;"></div>
        <span class="eyebrow" style="font-size:10px; align-self:center;">OWNERSHIP</span>
        <button class="chip" data-o="mine">Mine</button>
        <button class="chip" data-o="atrisk">At Risk</button>
        <button class="chip" data-o="tour">Tour Stops Only</button>
        <div style="margin-left:auto;">
          <span class="eyebrow" style="font-size:10px; margin-right:6px;">SORT</span>
          <select id="sort" style="background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:4px 10px; border-radius:var(--r-sm); font-size:var(--fs-sm);">
            <option value="loadIn-asc">Load-In (soonest first)</option>
            <option value="loadIn-desc">Load-In (latest first)</option>
            <option value="readiness">Readiness (worst first)</option>
            <option value="code">Code A→Z</option>
            <option value="revenue">Revenue (highest first)</option>
          </select>
        </div>
      </div>

      <div id="view"></div>
    </div>
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/permissions.js"></script>
<script src="assets/engines.js"></script>
<script src="assets/api.js"></script>
<script src="assets/seed.js"></script>
<script src="assets/app.js"></script>
<script>
  PCG.mountShell({active:'projects', crumbs:[{label:'Projects'}]});

  let state = { v:'grid', s:'all', o:null, sort:'loadIn-asc' };
  const tone = s => ({ Green:'green', Yellow:'amber', Red:'red', Blocked:'red' }[s] || 'gray');

  function render(){
    const all = PCG.api.getProjects();
    let list = all.slice();
    if(state.s !== 'all') list = list.filter(p=>p.show && p.show.lifecycleState===state.s);
    if(state.o === 'mine') list = list.filter(p=>p.pmId===PCG.user.id || p.aeId===PCG.user.id || p.primaryPM===PCG.user.id);
    if(state.o === 'atrisk') list = list.filter(p => {
      const r = PCG.api.getReadiness(p.code);
      return r && (r.overall==='Red' || r.overall==='Blocked' || r.overall==='Yellow');
    });
    if(state.o === 'tour') list = list.filter(p => !!p.tourId);
    const q = (document.getElementById('q').value||'').toLowerCase();
    if(q) list = list.filter(p => [p.code, p.name, p.client, p.venueName].some(v => (v||'').toLowerCase().includes(q)));

    if(state.sort==='loadIn-asc')  list.sort((a,b)=>new Date(a.dates.loadIn)-new Date(b.dates.loadIn));
    if(state.sort==='loadIn-desc') list.sort((a,b)=>new Date(b.dates.loadIn)-new Date(a.dates.loadIn));
    if(state.sort==='readiness'){
      const rank = { Blocked:0, Red:1, Yellow:2, Green:3 };
      list.sort((a,b) => {
        const ra = PCG.api.getReadiness(a.code), rb = PCG.api.getReadiness(b.code);
        return (rank[ra&&ra.overall] ?? 4) - (rank[rb&&rb.overall] ?? 4);
      });
    }
    if(state.sort==='code') list.sort((a,b)=>a.code.localeCompare(b.code));
    if(state.sort==='revenue' && PCG.canSeeTier('T2_MARGINS')){
      list.sort((a,b)=>{
        const qa = (PCG.quotes||[]).find(x=>x.projectCode===a.code);
        const qb = (PCG.quotes||[]).find(x=>x.projectCode===b.code);
        return ((qb&&qb.totalRevenue)||0) - ((qa&&qa.totalRevenue)||0);
      });
    }

    // KPI strip
    document.getElementById('kpis').innerHTML = `
      <div class="kpi"><div class="label">Total</div><div class="value">${all.length}</div><div class="sub">all projects</div></div>
      <div class="kpi blue"><div class="label">Active</div><div class="value">${all.filter(p=>p.show && !['Archived'].includes(p.show.lifecycleState)).length}</div><div class="sub">non-archived</div></div>
      <div class="kpi purple"><div class="label">On Show</div><div class="value">${all.filter(p=>p.show && p.show.lifecycleState==='OnShow').length}</div><div class="sub">live</div></div>
      <div class="kpi amber"><div class="label">In Prep</div><div class="value">${all.filter(p=>p.show && p.show.lifecycleState==='InPrep').length}</div><div class="sub">prepping</div></div>
      <div class="kpi"><div class="label">Showing</div><div class="value">${list.length}</div><div class="sub">filter result</div></div>
      <div class="kpi"><div class="label">Load-In &lt; 14d</div><div class="value">${all.filter(p=>{const d=new Date(p.dates.loadIn); const diff=(d-PCG.today)/(1000*60*60*24); return diff>-1 && diff<14;}).length}</div><div class="sub">next two weeks</div></div>
    `;

    // Render by mode
    const mount = document.getElementById('view');
    if(state.v === 'table'){
      mount.innerHTML = `
        <div class="card">
          <table class="pcg-table">
            <thead>
              <tr><th>Code</th><th>Project</th><th>Client</th><th>Venue</th><th>Lifecycle</th>
                  <th>Readiness</th><th>Load-In</th><th>Show Start</th><th>PM</th><th>Revenue</th></tr>
            </thead>
            <tbody>${list.map(p=>{
              const r = PCG.api.getReadiness(p.code);
              const pm = PCG.findPerson(p.pmId || p.primaryPM);
              const quote = (PCG.quotes||[]).find(x=>x.projectCode===p.code);
              const tour = p.tourId ? (PCG.api.getTour ? PCG.api.getTour(p.tourId) : null) : null;
              return `<tr onclick="location.href='playbook.html?project=${p.code}'">
                <td class="mono">${p.code}${tour?'<div style="font-size:9px; color: var(--pcg-spotlight-purple); margin-top:2px;">🚌 Stop ' + (p.tourStopNumber||'?') + '</div>':''}</td>
                <td>
                  <strong>${PCG.escapeHtml(p.name)}</strong>
                  ${tour?`<div class="muted" style="font-size:10px; margin-top:2px;">Part of <a href="tour-view.html?id=${tour.id}" onclick="event.stopPropagation()">${PCG.escapeHtml(tour.name)}</a></div>`:''}
                </td>
                <td>${PCG.escapeHtml(p.client||'—')}</td>
                <td>${PCG.escapeHtml(p.venueName||'—')}</td>
                <td>${PCG.lifecyclePill(p.show&&p.show.lifecycleState)}</td>
                <td>${PCG.readinessBadge(r,{compact:true})}</td>
                <td class="mono">${PCG.fmtShort(p.dates.loadIn)}</td>
                <td class="mono">${PCG.fmtShort(p.dates.showStart)}</td>
                <td>${pm?PCG.escapeHtml(pm.name):'—'}</td>
                <td class="mono">${quote && PCG.canSeeTier('T2_MARGINS') ? PCG.money(quote.totalRevenue) : '—'}</td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        </div>`;
    } else {
      mount.innerHTML = `
        <div class="grid-3" style="gap:var(--sp-4);">${list.map(p=>{
          const r = PCG.api.getReadiness(p.code);
          const pm = PCG.findPerson(p.pmId || p.primaryPM);
          const quote = (PCG.quotes||[]).find(x=>x.projectCode===p.code);
          const banners = PCG.api.getActiveBanners(p.code);
          const comps = r && r.components ? r.components : {};
          const st = p.show && p.show.lifecycleState || 'Opportunity';
          return `
            <div class="proj-card state-${st}" onclick="location.href='playbook.html?project=${p.code}'">
              <div class="code">${PCG.escapeHtml(p.code)}</div>
              <div style="min-width:0;">
                <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:4px;">
                  ${PCG.lifecyclePill(st)}
                  ${PCG.readinessBadge(r,{compact:true})}
                  ${banners.length?`<span class="pill red" style="font-size:9px;">⚠ ${banners.length}</span>`:''}
                  ${p.tourId?`<span class="pill purple plain" style="font-size:9px;">🚌 STOP ${p.tourStopNumber||''}</span>`:''}
                </div>
                <div style="font-weight:600; font-size:var(--fs-md);">${PCG.escapeHtml(p.name)}</div>
                <div class="muted" style="font-size:var(--fs-xs); margin-top:4px;">${PCG.escapeHtml(p.client||'')} · ${PCG.escapeHtml(p.venueName||'')}${p.tourId?' · part of tour':''}</div>
                <div class="comps">
                  ${['warehouse','labor','ros','checklist','finance'].map(k=>{
                    const c = comps[k] || {};
                    return `<span class="pill plain ${tone(c.status)}" style="font-size:9px;" title="${PCG.escapeHtml((c.blockers||[]).concat(c.warnings||[]).join(' · ')||'OK')}">${k.slice(0,3).toUpperCase()}</span>`;
                  }).join('')}
                </div>
                <div style="display:flex; gap:var(--sp-3); margin-top:10px; font-size:11px; color:var(--text-tertiary);">
                  <span>📅 ${PCG.fmtShort(p.dates.loadIn)}</span>
                  <span>👤 ${pm?PCG.escapeHtml(pm.name.split(' ')[0]):'—'}</span>
                  ${quote && PCG.canSeeTier('T2_MARGINS') ? `<span class="mono">${PCG.money(quote.totalRevenue)}</span>` : ''}
                </div>
              </div>
              <div style="display:flex; flex-direction:column; gap:4px;">
                <a class="btn sm ghost" href="playbook.html?project=${p.code}">Playbook</a>
                <a class="btn sm ghost" href="project-crew.html?project=${p.code}">Crew</a>
              </div>
            </div>
          `;
        }).join('')}</div>
        ${!list.length ? PCG.states.empty('No projects match.') : ''}
      `;
    }
  }

  // Wire controls
  document.querySelectorAll('#viewSeg button').forEach(b=>b.addEventListener('click', e=>{
    document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.toggle('on', x===e.target));
    state.v = e.target.dataset.v; render();
  }));
  document.querySelectorAll('.chip[data-s]').forEach(b=>b.addEventListener('click', e=>{
    document.querySelectorAll('.chip[data-s]').forEach(x=>x.classList.toggle('on', x===e.target));
    state.s = e.target.dataset.s; render();
  }));
  document.querySelectorAll('.chip[data-o]').forEach(b=>b.addEventListener('click', e=>{
    const on = e.target.classList.toggle('on');
    state.o = on ? e.target.dataset.o : null; render();
  }));
  document.getElementById('q').addEventListener('input', render);
  document.getElementById('sort').addEventListener('change', e => { state.sort = e.target.value; render(); });

  render();
</script>
</body>
</html>
