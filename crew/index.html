<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0F1B2E" />
<title>PCG Crew</title>
<link rel="stylesheet" href="crew.css" />
</head>
<body>
<div class="shell" id="shell"></div>

<!-- Demo only — load shared seed data. In prod these lines go away; the PWA uses fetch('/api/crew/*'). -->
<script src="../assets/data.js"></script>
<script src="../assets/permissions.js"></script>
<script src="../assets/seed.js"></script>

<!-- Crew PWA's own API client — does not use PCG.api.* (different surface, different permissions) -->
<script src="crew-api.js"></script>

<script>
  const shell = document.getElementById('shell');

  const me    = CrewApi.getMe();
  const show  = CrewApi.getMyShow();
  const assns = CrewApi.getMyAssignments();
  const trav  = CrewApi.getMyTravel();
  const contacts = CrewApi.getKeyContacts();

  if(!me || !show){
    shell.innerHTML = `
      <div class="lock-panel">
        <h1>Access Expired</h1>
        <p>Your magic link may have expired, or no active show is assigned. Check with the Labor Coordinator.</p>
      </div>`;
  } else {
    const myNextAssn = assns.find(a=>a.showId===show.code) || assns[0];

    // Pick the next call date
    const today = new Date(); today.setHours(0,0,0,0);
    const nextDate = (myNextAssn && (myNextAssn.dates||[]).find(d => new Date(d)>=today)) || (myNextAssn && myNextAssn.dates && myNextAssn.dates[0]);

    const fmtDay = iso => {
      if(!iso) return '—';
      const d = new Date(iso);
      return `${d.toLocaleString('en-US',{weekday:'short'})} ${d.toLocaleString('en-US',{month:'short'})} ${d.getDate()}`;
    };
    const statusCls = (myNextAssn && myNextAssn.status==='Confirmed') ? 'confirmed' : 'invited';

    shell.innerHTML = `
      <header class="hero">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
          <img src="../assets/pcg-logo.png" onerror="this.onerror=null;this.src='../assets/pcg-logo.svg';" alt="PCG" style="width:32px; height:32px; border-radius:50%;" />
          <div class="kicker" style="margin:0;">PCG CREW · LIGHTS. CAMERA. SHOWTIME.</div>
        </div>
        <h1>${escapeHtml(show.name)}</h1>
        <span class="status ${statusCls}">${myNextAssn ? escapeHtml(myNextAssn.status.toUpperCase()) : 'PENDING'}</span>
        <div class="me">
          <span class="avatar">${escapeHtml(me.initials)}</span>
          <div>
            <div class="nm">${escapeHtml(me.name)}</div>
            <div class="rl">${escapeHtml((myNextAssn && myNextAssn.position && myNextAssn.position.name) || me.role || 'Crew')}</div>
          </div>
        </div>
      </header>

      ${ myNextAssn ? `
        <div class="callcard">
          <div class="time">${escapeHtml(myNextAssn.callTime||'—')}</div>
          <div>
            <div style="font-family:var(--display); font-size:14px; text-transform:uppercase; letter-spacing:0.04em;">Next call</div>
            <div>${escapeHtml(fmtDay(nextDate))}</div>
            <div class="line">${escapeHtml(show.venue ? show.venue.name : '—')}</div>
          </div>
        </div>

        ${myNextAssn.status!=='Acknowledged' ? `<a href="javascript:acknowledge()" class="cta spectrum">Acknowledge</a>` : `<div class="cta ghost">✓ Acknowledged</div>`}
      ` : ''}

      <section class="section">
        <div class="label">Venue</div>
        <div class="value"><strong>${escapeHtml(show.venue ? show.venue.name : '—')}</strong></div>
        <div class="value" style="font-size:13px; color:var(--text2); margin-top:4px;">${escapeHtml(show.venue ? show.venue.address : '')}</div>
        ${show.venue && show.venue.loadInNotes ? `<div class="value" style="font-size:12px; color:var(--text2); margin-top:8px;">${escapeHtml(show.venue.loadInNotes)}</div>` : ''}
      </section>

      ${trav ? `
        <section class="section">
          <div class="label">Your Travel</div>
          <div class="value" style="margin-top:4px;"><strong>${escapeHtml(trav.airline||'')} ${escapeHtml(trav.route)}</strong></div>
          <div class="value" style="font-size:13px; color:var(--text2);">Conf · ${escapeHtml(trav.flightConfirmation||'—')}</div>
          <div class="value" style="font-size:13px;">${fmtDateTime(trav.departureTime)} → ${fmtDateTime(trav.arrivalTime)}</div>
          ${trav.hotelName ? `<div class="value" style="font-size:13px; margin-top:8px;"><strong>${escapeHtml(trav.hotelName)}</strong></div>
            <div class="value" style="font-size:12px; color:var(--text2);">Conf · ${escapeHtml(trav.hotelConfirmation||'—')}</div>` : ''}
        </section>` : ''}

      ${contacts.length ? `
        <section class="section">
          <div class="label">Key Contacts</div>
          ${contacts.map(c=>`
            <div class="value" style="margin-top:8px;">
              <strong>${escapeHtml(c.name)}</strong>
              <div style="font-size:12px; color:var(--text2);">${escapeHtml(c.role)} · <a href="tel:${escapeHtml(c.phone||'')}">${escapeHtml(c.phone||'')}</a></div>
            </div>`).join('')}
        </section>` : ''}

      <section class="section">
        <div class="label">Crew-Safe Documents</div>
        <div class="doc-list" style="margin-top:8px;">
          <div class="d"><span class="icon">❏</span>Show Book (crew-safe) · <a href="../showbook.html?project=${show.code}">View</a></div>
          <div class="d"><span class="icon">▣</span>Venue Load-In Map</div>
          <div class="d"><span class="icon">⌘</span>Show Flow (read-only)</div>
        </div>
      </section>

      <section class="shows">
        <div style="font-family:var(--display); text-transform:uppercase; letter-spacing:0.08em; font-size:11px; color:var(--text3); margin:8px 0;">Upcoming</div>
        ${assns.filter(a=>a.showId!==show.code).length ? assns.filter(a=>a.showId!==show.code).map(a => `
          <div class="item">
            <div class="day">${(new Date((a.dates||[])[0]||show.dates.showStart)).getDate()}<small>${(new Date((a.dates||[])[0]||show.dates.showStart)).toLocaleString('en-US',{month:'short'}).toUpperCase()}</small></div>
            <div style="flex:1;">
              <div class="nm">${escapeHtml(a.showName)}</div>
              <div class="rl">${escapeHtml((a.position&&a.position.name)||'—')} · Call ${escapeHtml(a.callTime||'—')}</div>
            </div>
            <div class="rl" style="font-size:10px; text-transform:uppercase;">${escapeHtml(a.status)}</div>
          </div>
        `).join('') : `<div style="font-size:13px; color:var(--text3);">No other upcoming shows.</div>`}
      </section>

      <footer class="footer">
        <div>PCG Crew PWA v1.0 · Magic-link scoped session</div>
        <div style="margin-top:6px;">Issues? Text <a href="tel:+13135550100">PM</a></div>
      </footer>
    `;
  }

  function escapeHtml(s){
    return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDateTime(iso){
    if(!iso) return '—';
    const d = new Date(iso);
    return `${d.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric'})} ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
  }
  function acknowledge(){
    CrewApi.acknowledge(show.code);
    location.reload();
  }
</script>
</body>
</html>
