<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PCG Stage · Action Queue</title>
<link rel="stylesheet" href="assets/tokens.css" />
<link rel="stylesheet" href="assets/app.css" />
</head>
<body>
<div class="app">
  <div id="app-shell"></div>
  <main class="main">
    <div class="container">
      <div style="display:flex; align-items:flex-end; gap:var(--sp-3); margin-bottom:var(--sp-4);">
        <div>
          <div class="eyebrow">Action Queue</div>
          <h1>What Needs Me</h1>
          <div class="muted">Cross-project — approvals, decisions, ownership gaps, urgent risks.</div>
        </div>
        <div style="margin-left:auto; display:flex; gap:var(--sp-2);">
          <button class="chip on" data-f="all">All</button>
          <button class="chip" data-f="approval">Approvals</button>
          <button class="chip" data-f="decision">Decisions</button>
          <button class="chip" data-f="ownership">Ownership Gaps</button>
          <button class="chip" data-f="risk">Urgent Risks</button>
        </div>
      </div>

      <div class="kpi-strip" id="q-kpis"></div>

      <div class="card">
        <div class="card-header">
          <div class="title">Queue</div>
          <div class="muted" style="margin-left:auto; font-size:var(--fs-xs);" id="q-count"></div>
        </div>
        <div id="q-list"></div>
      </div>
    </div>
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/permissions.js"></script>
<script src="assets/engines.js"></script>
<script src="assets/api.js"></script>
<script src="assets/seed.js"></script>
<script src="assets/app.js"></script>
<script>
  PCG.mountShell({active:"action", crumbs:[{label:"Action Queue"}]});

  // Build live action queue from ALL cross-module sources (pitches, tours, sub-rentals, substitutions, cycle counts, add orders, ROS)
  const live = [];

  // 1. Pitch comments from clients (need AE response)
  (PCG.pitches||[]).forEach(p => {
    const pendingClientComments = (p.comments||[]).filter(c => {
      if(c.fromSide !== 'client') return false;
      // Check if there's a later PCG reply
      const laterReplies = (p.comments||[]).filter(r => r.fromSide==='pcg' && new Date(r.at) > new Date(c.at));
      return laterReplies.length === 0;
    });
    pendingClientComments.forEach(c => {
      const client = PCG.api.getClient(p.clientId);
      live.push({
        kind:'decision', priority:'medium',
        title:`Client comment awaiting reply: "${c.body.slice(0,60)}${c.body.length>60?'…':''}"`,
        proj: p.pitchNo,
        waitOn: 'AE (Jeff Springer)',
        stale: PCG.ago(c.at),
        href: 'pitch.html?id='+p.id
      });
    });
    // Option selected but pitch not yet converted
    if(p.selectedOptionId && !p.convertedQuoteId && p.status !== 'Accepted'){
      live.push({
        kind:'decision', priority:'high',
        title:`Client picked option on "${p.projectIdea}" — follow up`,
        proj: p.pitchNo,
        waitOn: 'AE',
        stale: PCG.ago(p.engagementEvents && p.engagementEvents.length ? p.engagementEvents[p.engagementEvents.length-1].at : p.issuedAt),
        href: 'pitch.html?id='+p.id
      });
    }
  });

  // 2. Pitches issued but not opened after 3+ days
  (PCG.pitches||[]).filter(p => p.status==='Issued' && p.issuedAt).forEach(p => {
    const days = (Date.now() - new Date(p.issuedAt).getTime()) / 86400000;
    if(days > 3 && !(p.engagementEvents||[]).some(e => e.type==='Opened')){
      live.push({
        kind:'risk', priority:'medium',
        title:`Pitch ${p.pitchNo} — sent ${Math.round(days)}d ago, never opened`,
        proj: p.pitchNo, waitOn:'Client open',
        stale: PCG.ago(p.issuedAt),
        href: 'pitch.html?id='+p.id
      });
    }
  });

  // 3. Tour stop issues
  (PCG.tourStops||[]).forEach(s => {
    (s.issues||[]).forEach(i => {
      live.push({
        kind:'risk', priority: i.severity==='major'?'high':'medium',
        title:`${s.city}: ${i.summary}`,
        proj: s.linkedProjectId,
        waitOn: 'Tour PM',
        stale: PCG.ago(i.at),
        href: 'tour-view.html?id='+s.tourId
      });
    });
  });

  // 4. Substitution proposals pending PM approval
  (PCG.substitutionProposals||[]).filter(s => s.status==='Proposed').forEach(s => {
    live.push({
      kind:'approval', priority: s.costDelta > 0 ? 'high' : 'medium',
      title:`Substitution: ${s.originalName} → ${s.substituteName} ${s.costDelta===0?'(transparent)':s.costDelta>0?'(+'+PCG.money(s.costDelta)+' — escalate)':'('+PCG.money(s.costDelta)+' credit)'}`,
      proj: s.showId, waitOn: s.requiresApproval||'PM',
      stale: PCG.ago(s.proposedAt),
      href: 'eqlpc.html'
    });
  });

  // 5. Sub-rentals awaiting approval
  (PCG.subRentals||[]).filter(r => r.status==='PendingApproval' || r.status==='Draft').forEach(r => {
    live.push({
      kind:'approval', priority:'medium',
      title:`Sub-Rental ${r.id}: ${r.itemDescription} · ${r.quotedCost?PCG.money(r.quotedCost):''}`,
      proj: r.projectCode || r.showId, waitOn: r.quotedCost > 10000 ? 'CFO' : 'Director',
      stale: r.createdAt ? PCG.ago(r.createdAt) : '—',
      href: 'procurement.html'
    });
  });

  // 6. Add orders from field
  (PCG.addOrders||[]).filter(ao => ao.status==='Requested' || ao.status==='Acknowledged').forEach(ao => {
    live.push({
      kind: ao.urgency==='Emergency'?'risk':'decision',
      priority: ao.urgency==='Emergency'?'high':ao.urgency==='Urgent'?'high':'medium',
      title:`Add Order ${ao.aoNumber}: ${ao.description}`,
      proj: ao.showId, waitOn:'WH Lead',
      stale: PCG.ago(ao.requestedAt),
      href: 'add-order.html'
    });
  });

  // 7. Cycle counts pending review
  (PCG.cycleCounts||[]).filter(c => c.status==='PendingReview').forEach(c => {
    live.push({
      kind:'approval', priority:'medium',
      title:`Cycle Count ${c.countNumber} — ${c.varianceSummary?c.varianceSummary.linesWithVariance:0} variance line(s) need review`,
      proj: c.warehouseId, waitOn:'WH Lead',
      stale: c.completedAt ? PCG.ago(c.completedAt) : '—',
      href: 'cycle-count.html'
    });
  });

  // 8. Work items (from proposal + approval writes)
  (PCG.workItems||[]).filter(w => w.status==='Open').forEach(w => {
    live.push({
      kind: w.type==='SubstitutionApproval'?'approval':'decision',
      priority: w.priority==='High'?'high':'medium',
      title: w.title,
      proj: '—', waitOn: (PCG.findPerson(w.ownerId)||{}).name || w.ownerId,
      stale: w.createdAt ? PCG.ago(w.createdAt) : '—',
      href: 'eqlpc.html'
    });
  });

  // Merge with static seeded queue, then de-duplicate
  const q = live.concat(PCG.actionQueue||[]);
  const countBy = k => q.filter(x=>x.kind===k).length;
  const kpi = document.getElementById("q-kpis");
  kpi.innerHTML = `
    <div class="kpi"><div class="label">Total Open</div><div class="value">${q.length}</div><div class="sub">Needing attention</div></div>
    <div class="kpi red"><div class="label">High Priority</div><div class="value">${q.filter(x=>x.priority==="high").length}</div><div class="sub">Addressing today</div></div>
    <div class="kpi blue"><div class="label">Approvals</div><div class="value">${countBy("approval")}</div><div class="sub">Awaiting sign-off</div></div>
    <div class="kpi amber"><div class="label">Decisions</div><div class="value">${countBy("decision")}</div><div class="sub">Pending input</div></div>
    <div class="kpi"><div class="label">Ownership Gaps</div><div class="value">${countBy("ownership")}</div><div class="sub">Unassigned</div></div>
    <div class="kpi red"><div class="label">Urgent Risks</div><div class="value">${countBy("risk")}</div><div class="sub">Live mitigations</div></div>
  `;

  const list = document.getElementById("q-list");
  const count = document.getElementById("q-count");
  const render = filter => {
    const items = filter==="all"?q:q.filter(x=>x.kind===filter);
    count.textContent = `${items.length} shown`;
    list.innerHTML = items.map(it=>{
      const pr = it.priority==="high"?'<span class="pill red">HIGH</span>':it.priority==="medium"?'<span class="pill amber">MED</span>':'<span class="pill gray">LOW</span>';
      const kindIcon = ({approval:"◎",decision:"?",ownership:"△",risk:"⚠"})[it.kind]||"•";
      return `
        <div class="q-row">
          <div style="color:var(--pcg-bright-blue); font-family:var(--font-display); font-weight:700;">${kindIcon}</div>
          <div>
            <div class="why">${PCG.escapeHtml(it.title)}</div>
            <div class="ctx"><span class="mono">${it.proj}</span> · ${it.kind.toUpperCase()} · Waiting on ${PCG.escapeHtml(it.waitOn)}</div>
          </div>
          <div>${pr}</div>
          <div class="mono muted">${it.stale}</div>
          <div style="display:flex; gap:4px; justify-content:flex-end;">
            <a class="btn sm" href="${it.href || ('playbook.html?project='+it.proj)}">Open</a>
            ${it.kind==="approval"?`<button class="btn sm primary">Approve</button>`:""}
          </div>
        </div>`;
    }).join("") || '<div class="empty">Nothing here.</div>';
  };
  render("all");
  document.querySelectorAll(".chip[data-f]").forEach(c=>c.addEventListener("click",e=>{
    document.querySelectorAll(".chip[data-f]").forEach(x=>x.classList.toggle("on", x===e.target));
    render(e.target.dataset.f);
  }));
</script>
</body>
</html>
