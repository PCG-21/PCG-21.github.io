<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PCG Stage · Clients</title>
<link rel="stylesheet" href="assets/tokens.css" />
<link rel="stylesheet" href="assets/app.css" />
<style>
  .client-row {
    display: grid; grid-template-columns: 44px 2fr 1fr 100px 110px 110px 140px;
    gap: var(--sp-3); align-items: center;
    padding: 12px var(--sp-4); border-bottom: 1px solid var(--border);
    font-size: var(--fs-sm); cursor: pointer;
  }
  .client-row:hover { background: var(--surface-2); }
  .client-av {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--grad-show-light-spectrum);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 12px; font-weight: 700; color: white;
  }
</style>
</head>
<body>
<div class="app">
  <div id="app-shell"></div>
  <main class="main">
    <div class="container">

      <div style="display:flex; align-items:flex-end; gap:var(--sp-3); margin-bottom:var(--sp-4);">
        <div>
          <div class="eyebrow">Client Master Records</div>
          <h1>Clients</h1>
          <div class="muted">Billing entity, preferences, do-not-use list, prior show history, AE of record.</div>
        </div>
        <div style="margin-left:auto; display:flex; gap:var(--sp-2);">
          <input id="q" placeholder="Search clients…" style="background:var(--surface-2); color:var(--text-primary); border:1px solid var(--border); padding:5px 12px; border-radius:var(--r-pill); width:220px; font-size:var(--fs-sm);" />
          <button class="btn sm">＋ New Client</button>
        </div>
      </div>

      <div class="kpi-strip" id="kpis"></div>

      <div class="split">
        <div>
          <div class="card">
            <div class="card-header"><div class="title">Client Library</div><span class="muted" style="margin-left:auto; font-size:var(--fs-xs);" id="count"></span></div>
            <div style="display:grid; grid-template-columns: 44px 2fr 1fr 100px 110px 110px 140px; gap:var(--sp-3); padding: 10px var(--sp-4); background: var(--surface-2); font-family:var(--font-display); font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color: var(--text-tertiary);">
              <div></div>
              <div>Client</div>
              <div>Industry</div>
              <div style="text-align:right;">Prior Shows</div>
              <div style="text-align:right;">Rev YTD</div>
              <div>Status</div>
              <div>AE of Record</div>
            </div>
            <div id="rows"></div>
          </div>
        </div>

        <aside>
          <div class="card" id="detailCard">
            <div class="card-header"><div class="title">Client Detail</div></div>
            <div class="card-body" id="detail">Select a client.</div>
          </div>
        </aside>
      </div>

    </div>
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/permissions.js"></script>
<script src="assets/engines.js"></script>
<script src="assets/api.js"></script>
<script src="assets/seed.js"></script>
<script src="assets/app.js"></script>
<script>
  PCG.mountShell({active:'portfolio', crumbs:[{label:'Clients'}]});

  const clients = PCG.api.getClients();
  let currentId = clients[0] ? clients[0].id : null;
  const canSeeRev = PCG.canSeeTier('T2_MARGINS');

  function initials(s){ return (s||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

  function render(){
    const q = (document.getElementById('q').value||'').toLowerCase();
    const filtered = clients.filter(c => !q || c.name.toLowerCase().includes(q) || (c.industry||'').toLowerCase().includes(q));
    document.getElementById('count').textContent = `${filtered.length} of ${clients.length}`;

    document.getElementById('rows').innerHTML = filtered.map(c=>{
      const priors = (c.priorProjectCodes||[]).length;
      const ae = PCG.findPerson(c.aeId);
      return `<div class="client-row ${c.id===currentId?'':''}" onclick="setClient('${c.id}')">
        <div><div class="client-av">${initials(c.name)}</div></div>
        <div>
          <div style="font-weight:600;">${PCG.escapeHtml(c.name)}</div>
          <div class="muted" style="font-size:11px;">${PCG.escapeHtml(c.billingAddress||'')}</div>
        </div>
        <div>${PCG.escapeHtml(c.industry||'—')}</div>
        <div class="mono" style="text-align:right;">${priors}</div>
        <div class="mono" style="text-align:right;">${canSeeRev?PCG.money(c.revenueYTD||0):'🔒'}</div>
        <div><span class="pill ${c.status==='Active'?'green':c.status==='New'?'blue':'gray'}" style="font-size:10px;">${(c.status||'—').toUpperCase()}</span></div>
        <div>${ae?PCG.escapeHtml(ae.name):'—'}</div>
      </div>`;
    }).join('') || PCG.states.empty('No clients match.');

    // KPIs
    const active = clients.filter(c=>c.status==='Active').length;
    const prospects = clients.filter(c=>c.status==='Prospect' || c.status==='New').length;
    const totalRev = clients.reduce((s,c)=>s+(c.revenueYTD||0),0);
    const totalPriors = clients.reduce((s,c)=>s+(c.priorProjectCodes||[]).length,0);
    const activeProjects = (PCG.api.getProjects()||[]).filter(p=>p.show && p.show.lifecycleState!=='Archived').length;
    document.getElementById('kpis').innerHTML = `
      <div class="kpi"><div class="label">Total Clients</div><div class="value">${clients.length}</div><div class="sub">in master</div></div>
      <div class="kpi"><div class="label">Active</div><div class="value" style="color:var(--status-green);">${active}</div><div class="sub">current relationships</div></div>
      <div class="kpi blue"><div class="label">New / Prospect</div><div class="value">${prospects}</div><div class="sub">in pipeline</div></div>
      <div class="kpi"><div class="label">Prior Shows</div><div class="value">${totalPriors}</div><div class="sub">historical</div></div>
      <div class="kpi"><div class="label">Active Projects</div><div class="value">${activeProjects}</div><div class="sub">underway</div></div>
      <div class="kpi"><div class="label">Revenue YTD</div><div class="value">${canSeeRev?PCG.money(totalRev):'🔒'}</div><div class="sub">portfolio</div></div>
    `;

    renderDetail();
  }

  function renderDetail(){
    const c = clients.find(x=>x.id===currentId);
    if(!c){ document.getElementById('detail').innerHTML = PCG.states.empty('Select a client.'); return; }
    const ae = PCG.findPerson(c.aeId);
    const projects = (PCG.api.getProjects()||[]).filter(p=>p.clientId===c.id);
    const rev = PCG.api.getClientRevenueRollup(c.id);

    document.getElementById('detail').innerHTML = `
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="client-av" style="width:48px; height:48px; font-size:14px;">${initials(c.name)}</div>
        <div>
          <div style="font-weight:600; font-size:var(--fs-md);">${PCG.escapeHtml(c.name)}</div>
          <div class="muted" style="font-size:var(--fs-xs);">${PCG.escapeHtml(c.industry||'')}</div>
        </div>
      </div>
      <div class="divider"></div>

      <div class="kv-grid">
        <div class="k">Billing</div><div class="v">${PCG.escapeHtml(c.billingAddress||'—')}</div>
        <div class="k">AE of Record</div><div class="v">${ae?PCG.escapeHtml(ae.name):'—'}</div>
        <div class="k">Status</div><div class="v">${c.status}</div>
        <div class="k">Prior Shows</div><div class="v">${(c.priorProjectCodes||[]).length}</div>
        ${canSeeRev?`<div class="k">Revenue YTD</div><div class="v mono">${PCG.money(c.revenueYTD||0)}</div>`:''}
        ${canSeeRev && rev ? `<div class="k">Quoted (Active)</div><div class="v mono">${PCG.money(rev.quoted)}</div>`:''}
      </div>

      ${(c.preferences||[]).length ? `
        <div class="divider"></div>
        <div class="eyebrow">Client Preferences</div>
        <ul style="font-size:var(--fs-sm); margin:6px 0 0; padding-left:18px;">
          ${(c.preferences||[]).map(p=>`<li>${PCG.escapeHtml(p)}</li>`).join('')}
        </ul>
      `:''}

      ${(c.doNotUse||[]).length ? `
        <div class="divider"></div>
        <div class="eyebrow" style="color:var(--status-red);">Do Not Use (Scheduling only)</div>
        <ul style="font-size:var(--fs-sm); margin:6px 0 0; padding-left:18px; color:var(--status-red);">
          ${(c.doNotUse||[]).map(p=>`<li>${PCG.escapeHtml(p)}</li>`).join('')}
        </ul>
      `:''}

      <div class="divider"></div>
      <div class="eyebrow">Active Projects (${projects.length})</div>
      <div style="margin-top:6px; display:grid; gap:6px; font-size:var(--fs-sm);">
        ${projects.length ? projects.map(p=>`
          <a href="playbook.html?project=${p.code}" class="pinned" style="text-decoration:none; color:inherit;">
            <span class="icon mono">${p.code}</span>
            <div><strong>${PCG.escapeHtml(p.name)}</strong>
              <div class="muted" style="font-size:var(--fs-xs);">${PCG.lifecyclePill(p.show&&p.show.lifecycleState)} · ${PCG.fmtShort(p.dates.loadIn)}</div>
            </div>
          </a>`).join('') : '<div class="muted">No active projects.</div>'}
      </div>

      <div class="divider"></div>
      <div class="eyebrow">Prior Projects</div>
      <div style="margin-top:6px; font-size:var(--fs-sm);">
        ${(c.priorProjectCodes||[]).length ? (c.priorProjectCodes||[]).map(code=>`
          <div style="padding:6px 0; border-bottom: 1px dashed var(--border);"><strong class="mono">${PCG.escapeHtml(code)}</strong></div>
        `).join('') : '<div class="muted">No prior projects recorded.</div>'}
      </div>
    `;
  }

  window.setClient = (id) => { currentId = id; render(); };
  document.getElementById('q').addEventListener('input', render);
  render();
</script>
</body>
</html>
