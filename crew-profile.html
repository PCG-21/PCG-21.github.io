<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PCG Stage · Crew Profile</title>
<link rel="stylesheet" href="assets/tokens.css" />
<link rel="stylesheet" href="assets/app.css" />
<style>
  .cp-top {
    display:grid; grid-template-columns: 150px 1fr 1fr;
    gap: var(--sp-5); padding: var(--sp-4) 0 var(--sp-5);
    border-bottom: 1px solid var(--border);
    margin-bottom: var(--sp-5);
  }
  .cp-avatar {
    width:130px; height:130px; border-radius:var(--r-md);
    background: var(--surface-2); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-size:44px; font-weight:700; color:var(--text-tertiary);
    border: 1px solid var(--border); background-size: cover; background-position: center;
  }
  .cp-avatar .upload {
    display:block; font-family:var(--font-display); font-size:11px;
    color:var(--pcg-bright-blue); letter-spacing:0.08em; text-transform:uppercase;
    text-align:center; margin-top:6px; cursor:pointer;
  }
  .cp-meta h1 { margin:0 0 4px; font-size:28px; }
  .cp-meta .phone { font-family:var(--font-display); font-size:15px; color:var(--text-primary); }
  .cp-meta .email { color:var(--pcg-bright-blue); font-size:var(--fs-sm); margin-top:2px; }
  .cp-meta .ids { margin-top:10px; display:flex; gap:14px; font-size:var(--fs-xs); color:var(--text-secondary); flex-wrap:wrap; }
  .cp-meta .ids span.ic { color:var(--text-tertiary); margin-right:4px; }
  .cp-meta .subtle-links { margin-top:8px; display:flex; gap:14px; font-size:var(--fs-xs); color:var(--text-tertiary); }
  .cp-positions { }
  .cp-positions h4 {
    margin:0 0 8px; font-family:var(--font-display); font-size:11px;
    text-transform:uppercase; letter-spacing:0.08em;
    color:var(--text-tertiary);
    display:flex; justify-content:space-between; align-items:baseline;
  }
  .cp-positions h4 .rating-big { font-size:12px; color:var(--text-primary); }
  .cp-pos-row {
    display:grid; grid-template-columns: 1fr 50px 90px 50px;
    gap:8px; padding:5px 0; border-bottom:1px dashed var(--border);
    font-size:var(--fs-sm);
  }
  .cp-pos-row .rt { font-family:var(--font-mono); text-align:right; color:var(--text-primary); font-weight:600; }
  .cp-pos-row .rate { font-family:var(--font-mono); text-align:right; color:var(--text-secondary); }
  .cp-pos-row .unit { font-size:11px; color:var(--text-tertiary); }

  .cp-badges {
    display:grid; grid-template-columns: 1fr 1fr;
    gap: var(--sp-4); margin-top: 0;
    grid-column: 1 / -1; padding-top: var(--sp-3); border-top: 1px solid var(--border);
  }
  .cp-badge h4 {
    margin:0 0 8px; font-family:var(--font-display); font-size:11px;
    text-transform:uppercase; letter-spacing:0.08em;
    color:var(--text-tertiary);
    display:flex; justify-content:space-between;
  }
  .cp-badge .body { font-size:var(--fs-sm); color:var(--text-primary); }
  .tag-pill {
    display:inline-flex; align-items:center; gap:4px;
    background:var(--pcg-bright-blue-muted, rgba(1,153,253,0.12));
    color:var(--pcg-bright-blue);
    padding:3px 10px; border-radius: var(--r-pill);
    font-family:var(--font-mono); font-size:11px; margin-right:6px;
  }
  .tag-pill .x { cursor:pointer; opacity:0.7; }

  /* Tab bar */
  .cp-tabs { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:var(--sp-4); overflow-x:auto; }
  .cp-tab {
    background:transparent; border:0; border-bottom:2px solid transparent;
    color:var(--text-secondary); padding:10px 18px;
    font-family:var(--font-display); font-size:13px; cursor:pointer;
    white-space:nowrap;
  }
  .cp-tab.on { color:var(--text-primary); border-bottom-color: var(--pcg-bright-blue); }
  .cp-tab:hover { color:var(--text-primary); }

  .cp-kv { display:grid; grid-template-columns: 220px 1fr; gap: 6px 16px; font-size:var(--fs-sm); }
  .cp-kv dt { font-family:var(--font-display); font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-tertiary); }
  .cp-kv dd { margin:0; color:var(--text-primary); }
  .cp-section { margin-bottom: var(--sp-5); }
  .cp-section h3 { font-family:var(--font-display); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-tertiary); padding-bottom:6px; border-bottom:1px solid var(--border); margin-bottom: var(--sp-3); display:flex; justify-content:space-between; align-items:baseline; }
  .cp-section h3 .add { color:var(--pcg-bright-blue); font-size:11px; cursor:pointer; font-family:var(--font-display); letter-spacing:0.08em; }

  /* Positions tab */
  .cp-pos-table { width:100%; font-size:var(--fs-sm); }
  .cp-pos-table th { text-align:left; font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-tertiary); padding:8px 6px; border-bottom:1px solid var(--border); }
  .cp-pos-table td { padding:10px 6px; border-bottom:1px solid var(--border); }
  .cp-pos-table td.mono { font-family:var(--font-mono); }
  .cp-pos-table .status-appr { color:var(--status-green); font-size:11px; font-weight:600; }
  .cp-pos-table .rate-default { color:var(--text-tertiary); font-size:11px; }

  /* History stats box */
  .cp-stat-box {
    background: var(--pcg-bright-blue); color:white;
    border-radius: var(--r-md); padding: var(--sp-5);
    text-align:center; box-shadow: 0 0 20px rgba(1,153,253,0.25);
  }
  .cp-stat-box .ico { font-size:32px; line-height:1; margin-bottom:6px; }
  .cp-stat-box .num { font-family:var(--font-display); font-size:48px; font-weight:700; line-height:1; }
  .cp-stat-box .lbl { font-family:var(--font-display); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; opacity:0.9; margin-top:4px; }

  /* Work frequency chart */
  .cp-chart { display:grid; grid-template-columns: repeat(12, 1fr); gap:4px; align-items:end; height:140px; padding: var(--sp-3) 0; }
  .cp-chart .bar { background: var(--pcg-bright-blue); border-radius: 2px 2px 0 0; position:relative; min-height:2px; }
  .cp-chart-labels { display:grid; grid-template-columns: repeat(12, 1fr); gap:4px; font-size:10px; color:var(--text-tertiary); text-align:center; font-family:var(--font-mono); }

  /* Mini calendar */
  .cp-cal { display:grid; grid-template-columns: repeat(7, 1fr); gap:4px; font-size:11px; }
  .cp-cal .dow { font-family:var(--font-display); font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-tertiary); text-align:center; padding:4px 0; }
  .cp-cal .day {
    aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    border-radius:50%; font-family:var(--font-mono);
    background:transparent; color:var(--text-secondary);
  }
  .cp-cal .day.worked { background:#2C2C2C; color:white; }
  .cp-cal .day.scheduled { background:rgba(47,191,113,0.3); color:var(--status-green); font-weight:600; }
  .cp-cal .day.unavailable { background:rgba(245,183,60,0.2); color:var(--status-amber); text-decoration:line-through; }
  .cp-cal-month { font-family:var(--font-display); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:6px; text-align:center; }

  /* Availability entry */
  .avail-row { display:grid; grid-template-columns: 1fr 1fr auto; gap:10px; padding:8px 0; border-bottom:1px dashed var(--border); font-size:var(--fs-sm); }

  /* Notifications list */
  .notif-row { display:grid; grid-template-columns: 160px 1fr 220px 100px; gap:12px; padding:8px 0; border-bottom:1px dashed var(--border); font-size:var(--fs-sm); align-items:center; }
  .notif-row .mono { font-family:var(--font-mono); font-size:11px; color:var(--pcg-bright-blue); }
  .notif-row .ts { font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary); }

  /* Rating donut */
  .rating-donut {
    width: 160px; height: 160px; border-radius:50%;
    background: conic-gradient(var(--status-amber) 0deg var(--rating-deg, 162deg), var(--surface-3) var(--rating-deg, 162deg) 360deg);
    display:flex; align-items:center; justify-content:center;
    margin: 0 auto;
  }
  .rating-donut .inner {
    width:130px; height:130px; border-radius:50%;
    background: var(--surface-0); display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .rating-donut .v { font-family:var(--font-display); font-size:28px; font-weight:700; }
  .rating-donut .c { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.08em; }
  .rating-bar { display:grid; grid-template-columns: 20px 1fr 50px; gap:8px; align-items:center; padding: 3px 0; font-size:11px; }
  .rating-bar .fill { height:6px; background:var(--status-amber); border-radius:2px; }

</style>
</head>
<body>
<div class="app">
  <div id="app-shell"></div>
  <main class="main">
    <div class="container" id="profileBody"></div>
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/permissions.js"></script>
<script src="assets/engines.js"></script>
<script src="assets/api.js"></script>
<script src="assets/seed.js"></script>
<script src="assets/app.js"></script>
<script>
  const crewId = PCG.qs('id','p.jspringer');
  const m = (PCG.crewMembers||[]).find(x=>x.id===crewId);
  const activeTab = PCG.qs('tab','general');

  if(!m){
    PCG.mountShell({active:'crew', crumbs:[{label:'Crew & Labor'},{label:'Not Found'}]});
    document.getElementById('profileBody').innerHTML = PCG.states.empty('Crew member not found.');
  } else {
    PCG.mountShell({active:'crew', crumbs:[
      {label:'Crew & Labor'},
      {label:m.name}
    ]});
    renderProfile();
  }

  function renderProfile(){
    const positions = (m.qualifications||[]).map(q => {
      const pos = PCG.api.getCrewPosition(q.positionId);
      const rate = pos && pos.ratesByVersion && pos.ratesByVersion[0];
      return {
        positionId: q.positionId,
        name: pos ? pos.name : q.positionId,
        rating: q.rating || 0,
        rate: rate ? (rate.dayRate || rate.billRate*8 || 400) : 400
      };
    });
    const avgRating = positions.length ? positions.reduce((s,p)=>s+(+p.rating||0),0) / positions.length : 0;
    const tags = (m.tags||['Employee']).slice();
    const initials = m.name.split(/\s+/).map(s=>s[0]).join('').toUpperCase().slice(0,3);

    // HEADER
    const headerHtml = `
      <div class="cp-top">
        <div>
          <div class="cp-avatar" style="${m.avatarUrl?`background-image:url(${m.avatarUrl});`:''}">${m.avatarUrl?'':initials}</div>
          <div class="upload" onclick="uploadAvatar()">⤴ Upload</div>
        </div>
        <div class="cp-meta">
          <h1>${PCG.escapeHtml(m.name)}</h1>
          <div class="phone">${PCG.escapeHtml(m.phone||'—')}</div>
          <div class="email">${PCG.escapeHtml(m.email||'—')}</div>
          <div class="ids">
            <div><span class="ic">#</span>${PCG.escapeHtml(m.employeeCode || m.id)}</div>
            <div><span class="ic">✈</span>${PCG.escapeHtml((m.homeBase||'').split(',')[1]?.trim() || 'DTW')}</div>
            <div><span class="ic">📍</span>${PCG.escapeHtml((m.homeBase||'').split(',')[0] || 'Detroit')}</div>
            <div><span class="ic">👤</span><a href="admin.html" style="color:var(--pcg-bright-blue);">User</a></div>
          </div>
          <div class="subtle-links">
            <div>📄 ${m.resumeUrl?'<a href="'+m.resumeUrl+'">View resume</a>':'No resume'}</div>
            <div>🌐 ${m.socialUrl?'<a href="'+m.socialUrl+'">Social profile</a>':'No social profile'}</div>
          </div>
        </div>
        <div class="cp-positions">
          <h4>Positions <span class="rating-big">Overall Rating: ${avgRating.toFixed(1)}</span></h4>
          ${positions.slice(0,6).map(p=>`
            <div class="cp-pos-row">
              <div>${PCG.escapeHtml(p.name)}</div>
              <div class="rt">${(+p.rating).toFixed(1)}</div>
              <div class="rate">$${p.rate.toFixed(2)}</div>
              <div class="unit">daily</div>
            </div>`).join('') || '<div class="muted" style="font-size:var(--fs-sm);">No positions added.</div>'}
        </div>

        <div class="cp-badges">
          <div class="cp-badge">
            <h4>Important Notes <span style="color:var(--text-tertiary);">Internal Only</span></h4>
            <div class="body" id="importantNotes">${PCG.escapeHtml(m.importantNote || '9/30: Request to get set up in Workmarket sent by Nina and Kelly')}</div>
          </div>
          <div class="cp-badge">
            <h4>Tags <span style="color:var(--text-tertiary);">Internal Only</span></h4>
            <div class="body">
              ${tags.map(t=>`<span class="tag-pill">⊗ Emp: ${PCG.escapeHtml(t)}</span>`).join('')}
              <span class="tag-pill" style="cursor:pointer; background:transparent; color:var(--text-tertiary);" onclick="addTag()">⊕</span>
            </div>
          </div>
        </div>
      </div>`;

    const tabs = [
      { k:'general', label:'General Info' },
      { k:'notes', label:'Notes' },
      { k:'positions', label:'Positions' },
      { k:'history', label:'History' },
      { k:'calendar', label:'Calendar' },
      { k:'files', label:'Files' },
      { k:'ratings', label:'Ratings' },
      { k:'stats', label:'Stats' },
      { k:'notifications', label:'Notifications' }
    ];
    const tabBar = `<div class="cp-tabs">${tabs.map(t=>`<button class="cp-tab ${t.k===activeTab?'on':''}" onclick="switchTab('${t.k}')">${t.label}</button>`).join('')}</div>`;

    document.getElementById('profileBody').innerHTML = headerHtml + tabBar + '<div id="tabContent"></div>';
    renderTab(activeTab);
  }

  window.switchTab = (k) => {
    const url = new URL(location.href);
    url.searchParams.set('tab', k);
    history.replaceState({}, '', url);
    document.querySelectorAll('.cp-tab').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase().replace(/\s/g,'') === ({'general':'generalinfo'}[k]||k)));
    // Simpler: just re-render
    const btns = document.querySelectorAll('.cp-tab');
    ['general','notes','positions','history','calendar','files','ratings','stats','notifications'].forEach((key,i)=>{
      if(btns[i]) btns[i].classList.toggle('on', key===k);
    });
    renderTab(k);
  };

  function renderTab(tab){
    const host = document.getElementById('tabContent');
    if(tab==='general')       host.innerHTML = tabGeneral();
    else if(tab==='notes')    host.innerHTML = tabNotes();
    else if(tab==='positions') host.innerHTML = tabPositions();
    else if(tab==='history')  host.innerHTML = tabHistory();
    else if(tab==='calendar') host.innerHTML = tabCalendar();
    else if(tab==='files')    host.innerHTML = tabFiles();
    else if(tab==='ratings')  host.innerHTML = tabRatings();
    else if(tab==='stats')    host.innerHTML = tabStats();
    else if(tab==='notifications') host.innerHTML = tabNotifications();
  }

  // ---- TAB: GENERAL INFO ----
  function tabGeneral(){
    const addr = m.address || {};
    const airport = m.homeBase && m.homeBase.includes(',') ? m.homeBase.split(',')[1].trim() : 'DTW';
    const customFields = m.customFields || {
      'Do you currently hold Workman\'s Comp insurance?': 'No Response Yet',
      'Do you have General Liability insurance?': 'No',
      'Do you have Workmen\'s Compensation insurance?': 'No',
      'How did you learn about Premier Creative Group (contact person)': m.referredBy || 'Jeff',
      'How many years have you worked in the industry?': '11-19',
      'Travel Item: Are you willing to travel for a touring event situation?': 'Yes',
      'Travel Item: Are you willing to travel for single event salutations? (not on a touring basis)': 'Yes',
      'What type of events have you worked (mark all that apply)?': 'Hotel AV, Corporate Events, Live Entertainment / Sports, Festivals, Trade Shows / Exhibit, Broadcast / Closed Studio, Theatre / Theatrical'
    };
    return `
      <div class="split" style="grid-template-columns: 1fr 1fr; gap:var(--sp-6);">
        <div>
          <div class="cp-section">
            <h3>General <span class="add" onclick="editGeneral()">✎</span></h3>
            <dl class="cp-kv">
              <dt>Full Name</dt><dd>${PCG.escapeHtml(m.fullName || m.name)}</dd>
              <dt>Legal Name</dt><dd>${PCG.escapeHtml(m.legalName || m.name)}</dd>
              <dt>Division</dt><dd>${PCG.escapeHtml(m.division || '—')}</dd>
              <dt>Payroll Group</dt><dd>${PCG.escapeHtml(m.payrollGroup || 'Technician - Non-Union')}</dd>
              <dt>Employee Code</dt><dd>${PCG.escapeHtml(m.employeeCode || m.id)}</dd>
              <dt>Status</dt><dd><span class="pill green plain">${PCG.escapeHtml(m.status || 'Active')}</span></dd>
              <dt>Classification</dt><dd>${PCG.escapeHtml(m.classification || (m.employmentType==='1099'?'1099 Contractor':'Full-time Employee'))}</dd>
              <dt>Email Address</dt><dd>${PCG.escapeHtml(m.email)}</dd>
              <dt>Mobile Number</dt><dd>${PCG.escapeHtml(m.phone)}</dd>
              <dt>Nearest Airport</dt><dd>${PCG.escapeHtml(airport)} — Detroit Metropolitan Wayne County Airport</dd>
              <dt>Timezone</dt><dd>${PCG.escapeHtml(m.timezone || 'America/New_York')}</dd>
              <dt>US State of Residence</dt><dd>${PCG.escapeHtml((addr.state) || 'MI')}</dd>
              <dt>Passport</dt><dd>${m.passport!==false?'Yes':'No'}</dd>
              <dt>PM / AM / Supervisor</dt><dd>${m.isSupervisor!==false?'Yes':'No'}</dd>
              <dt>Shirt Size</dt><dd>${PCG.escapeHtml(m.shirtSize || 'L')}</dd>
            </dl>
          </div>

          <div class="cp-section">
            <h3>Lasso Mobile Login <span class="add">✎ Edit</span></h3>
            <dl class="cp-kv">
              <dt>Login Codes</dt><dd><span class="pill gray plain">Disabled</span></dd>
              <dt>Login Password</dt><dd><span class="pill green plain">Enabled</span></dd>
            </dl>
          </div>

          <div class="cp-section">
            <h3>Local Markets <span class="add" onclick="addMarket()">⊕ Add</span></h3>
            ${(m.markets||['Detroit']).map(mk => `
              <div style="display:grid; grid-template-columns:200px 1fr 20px; gap:10px; padding:6px 0; border-bottom:1px dashed var(--border); font-size:var(--fs-sm);">
                <div>${PCG.escapeHtml(mk)}</div>
                <div class="muted" style="font-size:11px;">Timezone: Eastern</div>
                <div style="color:var(--text-tertiary); cursor:pointer;">⊗</div>
              </div>`).join('')}
          </div>

          <div class="cp-section">
            <h3>Address Info <span class="add" onclick="editAddress()">✎</span></h3>
            <dl class="cp-kv">
              <dt>Street 1</dt><dd>${PCG.escapeHtml(addr.street || '—')}</dd>
              <dt>City</dt><dd>${PCG.escapeHtml(addr.city || '—')}</dd>
              <dt>State</dt><dd>${PCG.escapeHtml(addr.state || '—')}</dd>
              <dt>Zip</dt><dd>${PCG.escapeHtml(addr.zip || '—')}</dd>
            </dl>
          </div>

          <div class="cp-section">
            <h3>Social Media <span class="add">⊕ Add</span></h3>
            <div class="muted" style="font-size:var(--fs-sm);">No social media added yet</div>
          </div>

          <div class="cp-section">
            <h3>Emergency Contacts <span class="add" onclick="addEmergencyContact()">⊕ Add</span></h3>
            ${(m.emergencyContacts || [{name:'lauren sharp',phone:'5866120929'}]).map(c=>`
              <div style="display:grid; grid-template-columns:1fr 1fr 20px 20px; gap:10px; padding:6px 0; border-bottom:1px dashed var(--border); font-size:var(--fs-sm); align-items:center;">
                <div>${PCG.escapeHtml(c.name)}</div>
                <div>${PCG.escapeHtml(c.phone)}</div>
                <div style="color:var(--text-tertiary); cursor:pointer;">✎</div>
                <div style="color:var(--text-tertiary); cursor:pointer;">⊗</div>
              </div>`).join('') || '<div class="muted" style="font-size:var(--fs-sm);">None</div>'}
          </div>

          <div class="cp-section">
            <h3>Referrals <span class="add">⊕ Add</span></h3>
            <div class="muted" style="font-size:var(--fs-sm);">No referrals added yet</div>
          </div>

          <div class="cp-section">
            <h3>References <span class="add">⊕ Add</span></h3>
            <div class="muted" style="font-size:var(--fs-sm);">No references added yet</div>
          </div>

          <div class="cp-section">
            <h3>Lasso Time <span class="add">✎</span></h3>
            <dl class="cp-kv">
              <dt>Employee Code</dt><dd class="mono">${PCG.escapeHtml(m.employeeCode || m.id)}</dd>
              <dt>Username</dt><dd class="mono">${PCG.escapeHtml(m.username || '—')}</dd>
            </dl>
            <div class="muted" style="font-size:var(--fs-xs); margin-top:var(--sp-3);">
              Last modified: ${PCG.fmtDate(m.updatedAt||'2025-05-01T14:05',{time:true})} by ${PCG.escapeHtml(m.updatedBy||'James Sharp')}
            </div>
          </div>
        </div>

        <div>
          <div class="cp-section">
            <h3>Custom Fields <span class="add">✎</span></h3>
            ${Object.entries(customFields).map(([k,v])=>`
              <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; padding:8px 0; border-bottom:1px dashed var(--border); font-size:var(--fs-sm);">
                <div style="text-transform:uppercase; font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; color:var(--text-tertiary);">${PCG.escapeHtml(k)}</div>
                <div>${PCG.escapeHtml(v)}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>`;
  }

  // ---- TAB: NOTES ----
  function tabNotes(){
    const notes = m.profileNotes || [
      { at:'2025-09-17T12:07', author:'Chelsea Oliver', title:'September 2025 Attire Measurements', body:'Chest: 41\nBody: 29\nNeck: 16.5\nSleeve: 29' }
    ];
    return `
      <div class="cp-section">
        <h3>All Notes Are Internal <span class="add" onclick="addProfileNote()">⊕ Add Note</span></h3>

  function renderMiniCal(dateObj, worked, unavail){
    const y = dateObj.getFullYear(), mo = dateObj.getMonth();
    const first = new Date(y, mo, 1).getDay(); // 0=Sun
    const daysInMo = new Date(y, mo+1, 0).getDate();
    const dowOrder = [1,2,3,4,5,6,0]; // Mon-first
    const monLabel = dateObj.toLocaleString('en-US', { month:'long', year:'numeric' }).toUpperCase();
    let cells = '';
    // Leading blanks: shift so Monday is first
    const leadingDow = (first + 6) % 7;
    for(let i=0;i<leadingDow;i++){
      const prevDay = new Date(y, mo, -leadingDow+i+1);
      cells += `<div class="day" style="color:var(--text-tertiary); opacity:0.4;">${prevDay.getDate()}</div>`;
    }
    for(let d=1; d<=daysInMo; d++){
      const iso = new Date(y,mo,d,12).toISOString().slice(0,10);
      const cls = worked.has(iso) ? 'scheduled' : (unavail.has(iso) ? 'worked' : '');
      cells += `<div class="day ${cls}">${d}</div>`;
    }
    return `
      <div>
        <div class="cp-cal-month">${monLabel}</div>
        <div class="cp-cal">
          <div class="dow">Mon</div><div class="dow">Tue</div><div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div><div class="dow">Sun</div>
          ${cells}
        </div>
      </div>`;
  }

  // ---- TAB: STATS ----
  function tabStats(){
    const myShifts = (PCG.shiftAssignments||[]).filter(sa => sa.crewMemberId === m.id);
    const now = new Date();
    const yearStart = new Date(now.getFullYear(), 0, 1);
    const allDates = new Set();
    const futureDates = new Set();
    let lastDate = null;
    myShifts.forEach(sa => {
      (sa.dates||[]).forEach(d => {
        allDates.add(d);
        const dt = new Date(d+'T12:00:00');
        if(dt > now) futureDates.add(d);
        if(!lastDate || d > lastDate){ if(dt <= now) lastDate = d; }
      });
    });
    const daysYTD = [...allDates].filter(d => {
      const dt = new Date(d+'T12:00:00');
      return dt >= yearStart && dt <= now;
    }).length;
    const eventsYTD = new Set(myShifts.filter(sa => (sa.dates||[]).some(d => new Date(d+'T12:00:00')>=yearStart && new Date(d+'T12:00:00')<=now)).map(sa=>sa.showId)).size;
    const totalEvents = new Set(myShifts.map(sa=>sa.showId)).size;
    return `

    m.tags = m.tags || []; m.tags.push(t); renderProfile();
  };
  window.editGeneral = () => alert('Edit General Info — fields are persisted on the crew record.');
  window.editAddress = () => alert('Edit Address — fields are persisted on the crew record.');
  window.addMarket = () => { const mk = prompt('Market (e.g. Chicago):'); if(mk){ m.markets=(m.markets||[]); m.markets.push(mk); renderProfile(); } };
  window.addEmergencyContact = () => {
    const name = prompt('Contact name:'); if(!name) return;
    const phone = prompt('Phone:'); if(!phone) return;
    m.emergencyContacts = m.emergencyContacts || []; m.emergencyContacts.push({name,phone}); renderProfile();
  };
  window.addProfileNote = () => {
    const title = prompt('Note title:'); if(!title) return;
    const body  = prompt('Body:'); if(!body) return;
    m.profileNotes = m.profileNotes || [];
    m.profileNotes.unshift({ at:new Date().toISOString(), author:PCG.user.name, title, body });
    renderProfile();
  };
  window.editDefaultRate = () => {
    const v = prompt('Default daily rate ($):', m.defaultDayRate||400);
    if(v){ m.defaultDayRate = parseFloat(v)||400; renderProfile(); }
  };
  window.editPositions = () => alert('Positions editor — add/approve qualifications per position with rating.');
  window.addUnavail = () => {
    const s = prompt('Start date (YYYY-MM-DD):'); if(!s) return;
    const e = prompt('End date (YYYY-MM-DD):', s); if(!e) return;
    const label = prompt('Reason / label:', 'None');
    m.unavailability = m.unavailability || [];
    m.unavailability.push({ start:s, end:e, label: label||'None' });
    renderProfile();
  };
  window.uploadFile = () => alert('Upload file — attaches to crew record, auditable.');
</script>
</body>
</html>
